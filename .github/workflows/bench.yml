name: bench

on:
  workflow_dispatch:
    inputs:
      iters:
        description: Benchmark iterations per path
        required: false
        default: '10'
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

jobs:
  bench-unavailable:
    name: Benchmark driver unavailable
    runs-on: ubuntu-latest
    steps:
      # The former p50 benchmark driver was removed during the Rust-server
      # cutover. Keep this workflow parseable, but do not run a fake benchmark
      # until a Rust benchmark driver lands.
      - name: Skip removed benchmark driver
        run: echo "::notice::p50 benchmark driver removed; no Rust replacement exists yet."
