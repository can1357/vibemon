syntax = "proto3";

package vmon.v1;

option go_package = "github.com/can1357/vibemon/sdk/go/internal/pb";

// gRPC-over-WebSocket bridge for clients without native HTTP/2 (browsers).
//
// One RPC per WebSocket connection to `GET /grpc` (auth: bearer header when
// the client can set one, else the same `?token=` query mechanism the old WS
// endpoints used; UDS peer-cred bypass unchanged). Every WS binary message in
// EITHER direction is exactly one encoded BridgeFrame; text messages are
// protocol errors.
//
//   client:  call → message* → half_close
//   server:  message* → end   (then closes the socket)
//
// `message` payloads are single encoded gRPC messages WITHOUT the 5-byte
// gRPC wire prefix — WS message boundaries provide framing. The server
// bridges frames onto the in-process gRPC services; `end` mirrors the RPC's
// status and trailers (including `vmon-code`).
message BridgeFrame {
  oneof frame {
    BridgeCall call = 1;
    bytes message = 2;
    BridgeHalfClose half_close = 3;
    BridgeEnd end = 4;
  }
}

// First client frame: names the RPC and carries request metadata.
message BridgeCall {
  // Full gRPC method path, e.g. "/vmon.v1.SandboxService/Exec".
  string method = 1;
  // ASCII request metadata (e.g. "authorization"). Binary metadata is not
  // supported over the bridge.
  map<string, string> metadata = 2;
}

// Client half-close: no further request messages will follow.
message BridgeHalfClose {}

// Terminal server frame: gRPC status + trailers for the RPC.
message BridgeEnd {
  // Numeric gRPC status code (0 = OK).
  int32 status = 1;
  // Status message (empty on OK).
  string message = 2;
  // ASCII trailer metadata (carries `vmon-code` on failures).
  map<string, string> trailers = 3;
}
