apiVersion: v1
kind: Service
metadata:
  name: {{ include "vmon.fullname" . }}-nodes
  labels:
    {{- include "vmon.labels" . | nindent 4 }}
    app.kubernetes.io/component: node
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
  selector:
    {{- include "vmon.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: node
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vmon.fullname" . }}-gateway
  labels:
    {{- include "vmon.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.nodes.service.type }}
  ports:
    - name: http
      port: {{ .Values.nodes.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "vmon.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: node
