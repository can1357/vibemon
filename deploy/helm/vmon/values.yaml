# Reuse one externally managed Secret instead of rendering credentials here.
# It must contain api-token, postgres-password, access-key, and secret-key;
# client-token is optional.
existingSecret: ""

global:
  # Production requires PostgreSQL and S3; single-node is intended only for evaluation.
  clusterMode: production

# Every vmon pod serves the API and owns VMs. Stateful identities provide a stable
# mesh seed while hard anti-affinity keeps host-networked VMM workers one per node.
nodes:
  replicaCount: 3
  image:
    repository: vibevmm/vmon
    pullPolicy: IfNotPresent
    tag: ""
  service:
    type: ClusterIP
    port: 8000
  apiToken: ""
  clientToken: ""
  region: ""
  hostNetwork: true
  resources:
    limits:
      cpu: "8"
      memory: 16Gi
    requests:
      cpu: "2"
      memory: 4Gi
  securityContext:
    privileged: true
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: true
    capabilities:
      add:
        - NET_ADMIN
        - SYS_ADMIN
        - DAC_OVERRIDE
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 20
    periodSeconds: 20
  readinessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  nodeSelector:
    virtualization: kvm
  tolerations: []
  affinity: {}

# Disposable rootless BuildKit service used for untrusted Dockerfile builds.
buildkit:
  enabled: true
  address: ""
  image:
    repository: moby/buildkit
    tag: v0.20.2-rootless
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: "4"
      memory: 8Gi
    requests:
      cpu: 500m
      memory: 1Gi
  persistence:
    enabled: true
    storageClass: ""
    size: 20Gi

# Bundled dependencies are suitable for evaluation. Production operators should
# disable them and supply managed PostgreSQL and S3 services.
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: 16-alpine
    pullPolicy: IfNotPresent
  persistence:
    storageClass: ""
    size: 8Gi
  auth:
    database: vmon_metadata
    username: vmon_admin
    password: change-me-postgres-password

externalDatabase:
  host: ""
  port: 5432
  database: ""
  username: ""
  password: ""
  sslmode: require

s3Storage:
  enabled: true
  image:
    repository: minio/minio
    tag: RELEASE.2024-06-06T09-36-42Z
    pullPolicy: IfNotPresent
  clientImage:
    repository: minio/mc
    tag: RELEASE.2024-06-05T07-38-10Z
  persistence:
    storageClass: ""
    size: 20Gi
  auth:
    accessKey: change-me-s3-access-key
    secretKey: change-me-s3-secret-key
    bucket: vmon-artifacts
    region: us-east-1
    prefix: vibemon

externalS3:
  endpoint: ""
  bucket: ""
  region: us-east-1
  accessKey: ""
  secretKey: ""
  forcePathStyle: true
  prefix: vibemon

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: vmon.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
