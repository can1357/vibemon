name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: |
          rustup show
          rustup target add ${{ matrix.target }}

      - name: Install Zig linker
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@cargo-zigbuild

      - name: Build vmon
        run: cargo zigbuild --locked --release --target ${{ matrix.target }} -p vmon

      - name: Build vmon-agent
        run: cargo zigbuild --locked --release --target ${{ matrix.target }} -p vmon-agent

      - name: Package binaries
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/vmon dist/vmon-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/vmon-agent dist/vmon-agent-${{ matrix.target }}
          sha256sum dist/* > dist/SHA256SUMS-${{ matrix.target }}.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vmon-${{ matrix.target }}
          path: dist/*

  python:
    name: Build Python SDK package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Build wheel and sdist
        working-directory: sdk/py
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-sdk-package
          path: sdk/py/dist/*

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [build, python]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
