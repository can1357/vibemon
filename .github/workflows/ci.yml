name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --workspace --all-targets --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: AArch64 check
        run: cargo check --workspace --all-targets --locked --target aarch64-unknown-linux-gnu

      - name: AArch64 clippy
        run: cargo clippy --workspace --all-targets --locked --target aarch64-unknown-linux-gnu -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Audit dependencies
        run: cargo audit

  macos:
    name: macOS aarch64 HVF
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Verify Apple Silicon runner
        run: test "$(uname -m)" = "arm64"

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install macOS native dependencies
        run: brew install libslirp pkg-config

      - name: Build
        run: cargo build --locked

      - name: Codesign HVF binary
        run: just codesign

      - name: Compile tests
        run: cargo test --locked --no-run

  python:
    name: Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check

      - name: Type check
        run: uv run mypy

      - name: Test
        run: uv run pytest

  go:
    name: Go SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sdk/go/go.mod
          cache-dependency-path: sdk/go/go.sum

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race ./...

  ui:
    name: Web UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

  sdk-ts:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/ts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun test
