syntax = "proto3";

package vmon.v1;

option go_package = "github.com/can1357/vibemon/sdk/go/internal/pb";

// gRPC surface of the vmon v1 API — the ONLY API. All clients speak gRPC:
// native HTTP/2 (h2c over TCP or UDS) for CLI/Python/Go, and a
// gRPC-over-WebSocket bridge (vmon/v1/bridge.proto, `GET /grpc`) for
// browsers/TypeScript. Only infrastructure surfaces remain plain HTTP:
// healthz, /metrics, the guest ports proxy, static UI, and mesh-internal
// template distribution.
//
// Documents that are schemaless JSON in the engine (sandbox views, create
// specs, bodies with flattened extras) travel as JSON strings — their schema
// is owned by the engine, not this file. Fully-typed REST bodies are proto
// messages here.
//
// Errors: RPCs fail with a gRPC status; the stable vmond error code
// (vmond/src/error.rs: not_found, not_running, busy, invalid, unsupported,
// unauthorized, engine) is carried in `vmon-code` response metadata.
// Status mapping: not_found→NOT_FOUND, invalid→INVALID_ARGUMENT,
// unauthorized→UNAUTHENTICATED, not_running→FAILED_PRECONDITION,
// busy→ABORTED, unsupported→UNIMPLEMENTED, engine→UNAVAILABLE.

// SandboxService provides RPCs to manage microVM sandboxes, perform file operations,
// stream logs, manage networks, and execute interactive processes.
service SandboxService {
  // Creates a new microVM sandbox instance.
  //
  // Replaces: POST /v1/sandboxes
  // Errors:
  //   - `invalid` (INVALID_ARGUMENT): The create spec is invalid or malformed.
  //   - `busy` (ABORTED): Required resources are locked.
  //   - `engine` (UNAVAILABLE): Hypervisor allocation or creation failed.
  rpc Create(CreateSandboxRequest) returns (JsonView);

  // Lists all registered microVM sandboxes, optionally filtered by tags.
  //
  // Replaces: GET /v1/sandboxes
  rpc List(ListSandboxesRequest) returns (ListSandboxesResponse);

  // Retrieves the current state, metadata, and status of a specific microVM sandbox.
  //
  // Replaces: GET /v1/sandboxes/{id}
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified sandbox ID does not exist.
  rpc Get(SandboxRef) returns (JsonView);

  // Gracefully stops a running sandbox microVM.
  // Sends a shutdown signal to the guest OS. If it fails to exit within a grace period,
  // it may be forcefully terminated depending on configuration.
  //
  // Replaces: POST /v1/sandboxes/{id}/stop
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified sandbox ID does not exist.
  //   - `not_running` (FAILED_PRECONDITION): The sandbox is already stopped.
  rpc Stop(StopSandboxRequest) returns (JsonView);

  // Stops (if running) and removes a sandbox from the registry, freeing all non-persistent resources.
  //
  // Replaces: DELETE /v1/sandboxes/{id}
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified sandbox ID does not exist.
  rpc Remove(SandboxRef) returns (JsonView);

  // Immediately terminates a sandbox microVM hypervisor process without graceful shutdown.
  // Equivalent to pulling the power plug.
  //
  // Replaces: POST /v1/sandboxes/{id}/terminate
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified sandbox ID does not exist.
  rpc Terminate(SandboxRef) returns (JsonView);

  // Pauses the execution of all vCPUs in the sandbox.
  // CPU threads are quiesced via signal (Linux) or hypervisor callback (macOS/HVF).
  //
  // Replaces: POST /v1/sandboxes/{id}/pause
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified sandbox ID does not exist.
  //   - `not_running` (FAILED_PRECONDITION): The sandbox is not running.
  rpc Pause(SandboxRef) returns (JsonView);

  // Resumes vCPU execution for a paused sandbox.
  //
  // Replaces: POST /v1/sandboxes/{id}/resume
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified sandbox ID does not exist.
  //   - `not_running` (FAILED_PRECONDITION): The sandbox is not in a paused state.
  rpc Resume(SandboxRef) returns (JsonView);

  // Extends the sandbox's remaining wall-clock time-to-live (TTL) by the specified duration.
  //
  // Replaces: POST /v1/sandboxes/{id}/extend
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified sandbox ID does not exist.
  rpc Extend(ExtendSandboxRequest) returns (JsonView);

  // Retrieves real-time performance and utilization metrics for the microVM.
  // Includes CPU utilization, memory footprint, virtio block/net throughput, and guest metrics.
  //
  // Replaces: GET /v1/sandboxes/{id}/metrics
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified sandbox ID does not exist.
  rpc Metrics(SandboxRef) returns (JsonView);

  // Streams the console log output of the microVM.
  // Supports streaming historical logs (via `tail`) and real-time output (via `follow`).
  //
  // Replaces: GET /v1/sandboxes/{id}/logs
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified sandbox ID does not exist.
  rpc Logs(LogsRequest) returns (stream LogChunk);

  // Executes a non-interactive command inside the guest via the guest agent and captures
  // its complete exit status, stdout, and stderr.
  //
  // Replaces: POST /v1/sandboxes/{id}/exec
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified sandbox ID does not exist.
  //   - `not_running` (FAILED_PRECONDITION): The sandbox is not running or guest agent is unreachable.
  //   - `invalid` (INVALID_ARGUMENT): Invalid command or arguments.
  rpc ExecCapture(ExecCaptureRequest) returns (ExecCaptureResponse);

  // Opens a bidirectional, interactive execution stream inside the guest via the guest agent.
  // Supports PTY/TTY allocation, real-time stdin write, resize, EOF signaling, and exit status streaming.
  // The first `ExecInput` message sent MUST contain the `ExecStart` payload.
  //
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified sandbox ID does not exist.
  //   - `not_running` (FAILED_PRECONDITION): The sandbox is not running or guest agent is unreachable.
  rpc Exec(stream ExecInput) returns (stream ExecOutput);

  // Opens an interactive shell session inside the guest.
  // The first `ExecInput` message sent MUST contain the `shell_params_json` payload.
  // The server emits a `Ready` frame containing the resolved sandbox ID before streaming I/O.
  //
  // Replaces: GET /v1/shell
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified sandbox ID does not exist.
  //   - `not_running` (FAILED_PRECONDITION): The sandbox is not running.
  rpc Shell(stream ExecInput) returns (stream ExecOutput);

  // Attaches a read-only stream to the microVM serial console, forwarding guest kernel output and boot logs.
  //
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified sandbox ID does not exist.
  rpc Attach(SandboxRef) returns (stream ExecOutput);

  // Reads the complete contents of a file inside the guest sandbox filesystem.
  //
  // Errors:
  //   - `not_found` (NOT_FOUND): The sandbox or the specified file does not exist.
  //   - `not_running` (FAILED_PRECONDITION): The sandbox is not running.
  rpc FileRead(FilePathRequest) returns (FileContent);

  // Writes or overwrites a file inside the guest sandbox filesystem.
  // Creates parent directories if they do not exist.
  //
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified sandbox ID does not exist.
  //   - `not_running` (FAILED_PRECONDITION): The sandbox is not running.
  rpc FileWrite(FileWriteRequest) returns (Ok);

  // Deletes a file or directory inside the guest sandbox filesystem.
  //
  // Errors:
  //   - `not_found` (NOT_FOUND): The sandbox or the specified file/directory does not exist.
  //   - `not_running` (FAILED_PRECONDITION): The sandbox is not running.
  rpc FileDelete(FileDeleteRequest) returns (Ok);

  // Lists files and directories within a given directory inside the guest sandbox.
  //
  // Errors:
  //   - `not_found` (NOT_FOUND): The sandbox or the specified path does not exist.
  //   - `not_running` (FAILED_PRECONDITION): The sandbox is not running.
  rpc FileList(FilePathRequest) returns (JsonView);

  // Performs a metadata query (stat) on a file inside the guest sandbox (size, type, permissions, times).
  //
  // Errors:
  //   - `not_found` (NOT_FOUND): The sandbox or the specified file does not exist.
  //   - `not_running` (FAILED_PRECONDITION): The sandbox is not running.
  rpc FileStat(FilePathRequest) returns (JsonView);

  // Retrieves the active network configuration, interfaces, and routing for the sandbox.
  //
  // Replaces: GET /v1/sandboxes/{id}/network
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified sandbox ID does not exist.
  rpc NetworkGet(SandboxRef) returns (JsonView);

  // Updates the network access controls, allowed CIDRs, and allowed domains for the sandbox.
  //
  // Replaces: PUT /v1/sandboxes/{id}/network
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified sandbox ID does not exist.
  //   - `invalid` (INVALID_ARGUMENT): Invalid network rules or CIDR formats.
  rpc NetworkSet(NetworkSetRequest) returns (JsonView);

  // Retrieves active network tunnels and port-forwardings mapped to the sandbox.
  //
  // Replaces: GET /v1/sandboxes/{id}/tunnels
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified sandbox ID does not exist.
  rpc Tunnels(SandboxRef) returns (JsonView);

  // Initiates state migration of the sandbox to a target destination or host.
  //
  // Replaces: POST /v1/sandboxes/{id}/migrate
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified sandbox ID does not exist.
  //   - `invalid` (INVALID_ARGUMENT): Target destination is invalid or unreachable.
  rpc Migrate(MigrateRequest) returns (JsonView);

  // Captures a snapshot of the sandbox's memory, register, and device state.
  //
  // Replaces: POST /v1/sandboxes/{id}/snapshot
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified sandbox ID does not exist.
  //   - `not_running` (FAILED_PRECONDITION): The sandbox is not currently running.
  rpc Snapshot(SnapshotRequest) returns (JsonView);

  // Triggers a filesystem freeze and creates a filesystem-level snapshot on disk.
  //
  // Replaces: POST /v1/sandboxes/{id}/snapshot-fs
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified sandbox ID does not exist.
  //   - `not_running` (FAILED_PRECONDITION): The sandbox is not running.
  rpc SnapshotFs(SnapshotFsRequest) returns (JsonView);
}

// SnapshotService manages saved microVM snapshots, enabling restorations and high-density forks.
service SnapshotService {
  // Lists all snapshots currently registered in the engine.
  //
  // Replaces: GET /v1/snapshots
  rpc List(ListSnapshotsRequest) returns (SnapshotList);

  // Restores a microVM sandbox instance from a previously captured snapshot.
  //
  // Replaces: POST /v1/snapshots/{name}/restore
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified snapshot name does not exist.
  //   - `invalid` (INVALID_ARGUMENT): Invalid configuration parameters.
  rpc Restore(RestoreSnapshotRequest) returns (JsonView);

  // Rapidly forks one or more new sandbox instances from an existing snapshot.
  // Under the hood, this utilizes copy-on-write sharing for high density and instant startup.
  //
  // Replaces: POST /v1/snapshots/{name}/fork
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified snapshot name does not exist.
  //   - `invalid` (INVALID_ARGUMENT): Invalid count or target configuration.
  rpc Fork(ForkSnapshotRequest) returns (JsonView);
}

// VolumeService provides RPCs for managing persistent block storage volumes.
service VolumeService {
  // Lists all persistent volumes currently registered in the engine registry.
  //
  // Replaces: GET /v1/volumes
  rpc List(ListVolumesRequest) returns (VolumeList);

  // Creates a new persistent block storage volume.
  //
  // Replaces: POST /v1/volumes
  // Errors:
  //   - `invalid` (INVALID_ARGUMENT): Invalid volume name, size, or parameters.
  //   - `busy` (ABORTED): Volume with the same name already exists.
  rpc Create(VolumeRef) returns (Ok);

  // Deletes a persistent block storage volume, permanently freeing its underlying disk storage.
  //
  // Replaces: DELETE /v1/volumes/{name}
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified volume does not exist.
  //   - `busy` (ABORTED): The volume is currently attached to a sandbox and cannot be deleted.
  rpc Delete(VolumeRef) returns (Ok);
}

// PoolService manages warm pools of standby microVMs to eliminate cold-start latency.
service PoolService {
  // Lists configured warm pools and their standby microVM counts.
  //
  // Replaces: GET /v1/pools
  rpc List(ListPoolsRequest) returns (JsonView);

  // Creates or updates a warm pool configuration, adjusting the standby target size.
  //
  // Replaces: PUT /v1/pools/{reference}
  // Errors:
  //   - `invalid` (INVALID_ARGUMENT): Invalid pool definition or size.
  rpc Set(PoolSetRequest) returns (JsonView);

  // Deletes a warm pool and tears down all pre-warmed standby sandboxes within it.
  //
  // Replaces: DELETE /v1/pools/{reference}
  // Errors:
  //   - `not_found` (NOT_FOUND): The specified pool reference does not exist.
  rpc Delete(PoolRef) returns (Ok);
}

// SystemService provides administrative queries and streams engine-wide event feeds.
service SystemService {
  // Retrieves general status, version, capabilities, and system metrics from the host engine.
  //
  // Replaces: GET /v1/info
  rpc Info(InfoRequest) returns (JsonView);

  // Streams real-time engine-wide events (e.g. sandbox boots, shutdowns, updates).
  //
  // Replaces: GET /v1/events (SSE)
  rpc Events(EventsRequest) returns (stream JsonView);

  // Mesh roster/status document for SDK endpoint discovery.
  //
  // Replaces: GET /v1/mesh/status (other /v1/mesh/* admin routes are
  // mesh-internal and remain HTTP).
  rpc MeshStatus(MeshStatusRequest) returns (JsonView);
}

// JsonView represents a schemaless JSON document string.
// Used for documents whose schemas are fully managed by the engine (e.g. sandbox view, metrics).
message JsonView {
  // The JSON-serialized object content.
  string json = 1;
}

// Ok represents a successful empty response.
message Ok {}

// SandboxRef references a specific sandbox instance by its ID.
message SandboxRef {
  // The unique identifier of the target sandbox.
  string id = 1;
}

// CreateSandboxRequest wraps the configuration JSON for sandbox creation.
message CreateSandboxRequest {
  // SandboxCreate JSON document payload — matches the former REST schema.
  string spec_json = 1;
}

// ListSandboxesRequest specifies filters for listing sandbox instances.
message ListSandboxesRequest {
  // Optional tag filter items (format: `key=value`). If empty, lists all sandboxes.
  repeated string tags = 1;
}

// ListSandboxesResponse wraps the list of retrieved sandbox configurations.
message ListSandboxesResponse {
  // An array of JSON-serialized sandbox view documents.
  repeated string sandboxes_json = 1;
}

// StopSandboxRequest represents parameters to gracefully stop a sandbox.
message StopSandboxRequest {
  // The unique identifier of the target sandbox.
  string id = 1;

  // Optional exit/return code of the foreground CLI process to preserve in metrics and logs.
  optional int64 returncode = 2;
}

// ExtendSandboxRequest represents parameters to extend the TTL of a sandbox.
message ExtendSandboxRequest {
  // The unique identifier of the target sandbox.
  string id = 1;

  // The duration to extend the sandbox's lifespan, in seconds.
  uint64 secs = 2;
}

// LogsRequest represents criteria for streaming microVM logs.
message LogsRequest {
  // The unique identifier of the target sandbox.
  string id = 1;

  // If true, the stream remains open and continues to send new console lines in real time (follow).
  bool follow = 2;

  // If set, specifies the number of historical console lines to retrieve before streaming new logs.
  optional uint64 tail = 3;
}

// LogChunk represents a binary slice of streamed console logs.
message LogChunk {
  // Raw byte payload containing the console output segment.
  bytes data = 1;
}

// ExecStart defines execution parameters for a command run inside the guest.
message ExecStart {
  // The command-line command and its arguments to run (e.g., ["sh", "-c", "ls -l"]).
  repeated string cmd = 1;

  // Optional absolute path of the directory inside the guest to start execution in.
  optional string workdir = 2;

  // Optional key-value environment variables to inject into the executed process.
  map<string, string> env = 3;

  // Optional process timeout duration in seconds. If exceeded, the process is terminated.
  optional double timeout = 4;

  // If true, allocates a pseudoterminal (PTY/TTY) inside the guest for interactive sessions.
  bool tty = 5;
  // Target sandbox. Required in the first ExecInput of SandboxService.Exec
  // (INVALID_ARGUMENT when empty); ignored under ExecCaptureRequest, whose
  // own `id` is authoritative.
  string sandbox_id = 6;
}

// ExecCaptureRequest represents execution parameters for buffered output capture.
message ExecCaptureRequest {
  // The unique identifier of the target sandbox.
  string id = 1;

  // The execution configuration.
  ExecStart exec = 2;
}

// ExecCaptureResponse contains the final status and complete buffered outputs of a command.
message ExecCaptureResponse {
  // The process termination status exit code.
  int64 code = 1;

  // The POSIX signal that terminated the process, if applicable.
  optional int64 signal = 2;

  // Complete stdout buffer contents captured from the command.
  bytes stdout = 3;

  // Complete stderr buffer contents captured from the command (empty if TTY is allocated).
  bytes stderr = 4;
}

// ExecInput represents the client-to-server payload in interactive execution streams.
message ExecInput {
  // The interactive input event.
  oneof input {
    // Required first message on the `/exec` stream to initiate execution.
    ExecStart start = 1;

    // Required first message on the `/shell` stream to initialize the shell.
    // Contains JSON configuration (e.g. "{}" for defaults).
    string shell_params_json = 2;

    // A chunk of raw standard input (stdin) bytes to write to the guest process.
    bytes stdin = 3;

    // Signals the closing of the standard input stream (EOF) from the client.
    Eof eof = 4;

    // Requests a change in the guest's pseudoterminal (pty) window dimensions.
    Resize resize = 5;
  }
}

// ExecOutput represents the server-to-client payload in interactive execution streams.
message ExecOutput {
  // The interactive output event.
  oneof output {
    // A chunk of standard output or standard error streamed from the guest.
    Output chunk = 1;

    // Indicates that the guest process has terminated.
    Exit exit = 2;

    // Emitted exactly once upon successful session initialization before any chunks are sent.
    Ready ready = 3;
  }
}

// FilePathRequest specifies a file path within a sandbox's guest filesystem.
message FilePathRequest {
  // The unique identifier of the target sandbox.
  string id = 1;

  // The target absolute path inside the guest.
  string path = 2;
}

// FileContent contains raw file data read from the guest.
message FileContent {
  // The raw file data payload.
  bytes data = 1;
}

// FileWriteRequest encapsulates data to write to a path in the guest filesystem.
message FileWriteRequest {
  // The unique identifier of the target sandbox.
  string id = 1;

  // The target absolute path inside the guest.
  string path = 2;

  // The raw data payload to write.
  bytes data = 3;
}

// FileDeleteRequest represents parameters for deleting a guest file.
message FileDeleteRequest {
  // The unique identifier of the target sandbox.
  string id = 1;

  // The target absolute path inside the guest.
  string path = 2;

  // If true, recursively deletes directories and their contents.
  bool recursive = 3;
}

// StringList represents a list of string values. Used to distinguish between
// an empty list and an omitted/absent list (for presence-aware updates).
message StringList {
  // The string values.
  repeated string values = 1;
}

// NetworkSetRequest represents network firewall and access rules updates for a sandbox.
message NetworkSetRequest {
  // The unique identifier of the target sandbox.
  string id = 1;

  // Optional: if set, blocks or allows external network access for the sandbox.
  optional bool block_network = 2;

  // Presence-aware CIDR block IP whitelist. If omitted, CIDR allowlist is left unchanged.
  StringList cidr_allow = 3;

  // Presence-aware domain name whitelist. If omitted, domain allowlist is left unchanged.
  StringList domain_allow = 4;
}

// MigrateRequest represents parameters to migrate a sandbox.
message MigrateRequest {
  // The unique identifier of the target sandbox to migrate.
  string id = 1;

  // The destination address or host URI.
  string target = 2;
}

// SnapshotRequest defines snapshot creation parameters.
message SnapshotRequest {
  // The unique identifier of the target sandbox.
  string id = 1;

  // Optional name to assign to the snapshot. If omitted, an auto-generated name is used.
  optional string name = 2;

  // If true, stops the sandbox microVM immediately after taking the snapshot.
  bool stop = 3;
}

// SnapshotFsRequest defines filesystem-level freeze/snapshot parameters.
message SnapshotFsRequest {
  // The unique identifier of the target sandbox.
  string id = 1;

  // Optional name to assign to the filesystem snapshot.
  optional string name = 2;
}

// ListSnapshotsRequest represents a request to list snapshots.
message ListSnapshotsRequest {}

// SnapshotList wraps the list of registered snapshots.
message SnapshotList {
  // The list of snapshot names.
  repeated string snapshots = 1;
}

// RestoreSnapshotRequest represents parameters to restore a sandbox from a snapshot.
message RestoreSnapshotRequest {
  // The unique identifier or name of the target snapshot.
  string name = 1;

  // JSON configuration string mapping to RestoreBody (defines targets, pool assignments, and options).
  string body_json = 2;
}

// ForkSnapshotRequest represents parameters to clone/fork a sandbox from a snapshot.
message ForkSnapshotRequest {
  // The unique identifier or name of the source snapshot.
  string name = 1;

  // JSON configuration string mapping to ForkBody (defines copy-on-write target counts and settings).
  string body_json = 2;
}

// ListVolumesRequest represents a request to list persistent volumes.
message ListVolumesRequest {}

// VolumeList wraps the list of persistent volumes.
message VolumeList {
  // The list of persistent volume names.
  repeated string volumes = 1;
}

// VolumeRef represents a reference to a persistent volume.
message VolumeRef {
  // The unique name of the persistent volume.
  string name = 1;
}

// ListPoolsRequest represents a request to list warm pools.
message ListPoolsRequest {}

// PoolSetRequest represents configuration for creating/updating a warm pool.
message PoolSetRequest {
  // The reference identifier of the warm pool.
  string reference = 1;

  // JSON configuration string mapping to PoolPutBody (defines standby sandbox pool size and specs).
  string body_json = 2;
}

// PoolRef represents a reference to a warm pool.
message PoolRef {
  // The reference identifier of the target warm pool.
  string reference = 1;
}

// InfoRequest represents a request for server metadata.
message InfoRequest {}

// MeshStatusRequest represents a request for the mesh roster/status document.
message MeshStatusRequest {}

// EventsRequest represents a request to stream system events.
message EventsRequest {}

// Eof signals the completion of the standard input stream (EOF) from client to server.
message Eof {}

// Resize defines the dimensions of a pseudoterminal (pty) window.
message Resize {
  // The number of terminal rows. Must be in the range [1, 65535].
  // Values outside this range will cause the server to reject the resize request.
  uint32 rows = 1;

  // The number of terminal columns. Must be in the range [1, 65535].
  // Values outside this range will cause the server to reject the resize request.
  uint32 cols = 2;
}

// Output encapsulates output data streamed from a running guest process or the hypervisor console.
message Output {
  // The stream source of the output data (stdout, stderr, or console).
  Stream stream = 1;

  // The raw byte payload of the output chunk.
  bytes data = 2;
}

// Stream identifies the source channel of streamed output data.
enum Stream {
  // Unspecified stream. Used as a fallback or default value.
  STREAM_UNSPECIFIED = 0;

  // Standard output stream (stdout) of the executed process.
  STREAM_STDOUT = 1;

  // Standard error stream (stderr) of the executed process.
  STREAM_STDERR = 2;

  // Hypervisor-level raw serial console stream of the microVM.
  STREAM_CONSOLE = 3;
}

// Exit represents the termination status of an executed guest process.
message Exit {
  // The process exit status code. Typically 0 for success, and non-zero for failures.
  int64 code = 1;

  // The POSIX signal number that terminated the process, if applicable (e.g. SIGKILL, SIGSEGV).
  // Omitted if the process exited voluntarily.
  optional int64 signal = 2;
}

// Ready signals that the interactive session has been initialized successfully.
message Ready {
  // The unique identifier of the active microVM sandbox.
  string sandbox_id = 1;
}

// ArtifactService stores and retrieves immutable content-addressed byte sequences.
service ArtifactService {
  // Put uploads an artifact as an ordered client stream and verifies its digest.
  rpc Put(stream PutArtifactRequest) returns (ArtifactRecord);
  // Get downloads an artifact as an ordered server stream.
  rpc Get(GetArtifactRequest) returns (stream ArtifactChunk);
  // Stat returns artifact metadata without transferring its contents.
  rpc Stat(ArtifactRef) returns (ArtifactRecord);
}

// FunctionService manages immutable function revisions, atomic application
// activations, and durable schedule definitions.
service FunctionService {
  // Register creates an immutable revision from a fully typed function specification.
  rpc Register(RegisterFunctionRequest) returns (FunctionRevision);
  // Get resolves either a pinned revision or a function's current active revision.
  rpc Get(GetFunctionRequest) returns (FunctionRevision);
  // List returns function revisions in stable creation order.
  rpc List(ListFunctionsRequest) returns (ListFunctionsResponse);
  // Activate atomically makes a revision current for its function.
  rpc Activate(ActivateFunctionRequest) returns (FunctionRecord);
  // Delete removes an inactive function revision.
  rpc Delete(DeleteFunctionRequest) returns (Ok);
  // ActivateApp atomically publishes a complete set of pinned function revisions.
  rpc ActivateApp(ActivateAppRequest) returns (AppRevision);
  // GetApp resolves either the current or a pinned application revision.
  rpc GetApp(GetAppRequest) returns (AppRevision);
  // RollbackApp atomically restores a prior application revision as current.
  rpc RollbackApp(RollbackAppRequest) returns (AppRevision);
  // CreateSchedule creates or replaces a typed cron or fixed-period schedule.
  rpc CreateSchedule(CreateScheduleRequest) returns (ScheduleRecord);
  // GetSchedule returns a schedule by its stable identifier.
  rpc GetSchedule(ScheduleRef) returns (ScheduleRecord);
  // ListSchedules lists schedules, optionally filtered by application or function.
  rpc ListSchedules(ListSchedulesRequest) returns (ListSchedulesResponse);
  // DeleteSchedule permanently removes a schedule.
  rpc DeleteSchedule(ScheduleRef) returns (Ok);
}

// CallService persists function invocations, batch inputs and indexed results,
// and exposes reconnectable execution event streams.
service CallService {
  // Create durably records a call before any execution is eligible to begin.
  rpc Create(CreateCallRequest) returns (CallRecord);
  // StreamInputs bidirectionally appends ordered inputs and acknowledges the opener and every committed input.
  rpc StreamInputs(stream StreamCallInputsRequest) returns (stream StreamCallInputsResponse);
  // CloseInputs marks an input stream complete so execution can finish.
  rpc CloseInputs(CloseCallInputsRequest) returns (CallRecord);
  // Get returns the latest durable state of a call.
  rpc Get(CallRef) returns (CallRecord);
  // List returns calls in stable creation order.
  rpc List(ListCallsRequest) returns (ListCallsResponse);
  // GetResult returns one durable result by its input or yield index.
  rpc GetResult(GetCallResultRequest) returns (CallResult);
  // ListResults returns a bounded page after a durable result sequence cursor.
  rpc ListResults(ListCallResultsRequest) returns (ListCallResultsResponse);
  // Watch streams events after a durable sequence cursor and may follow new events.
  rpc Watch(WatchCallRequest) returns (stream CallEvent);
  // Cancel durably requests cancellation of a call and its unfinished work.
  rpc Cancel(CancelCallRequest) returns (CallRecord);
}

// ActorService manages durable actor identities and immutable actor checkpoints.
service ActorService {
  // Create durably creates an actor pinned to a function revision.
  rpc Create(CreateActorRequest) returns (ActorRecord);
  // Get returns the latest durable actor state.
  rpc Get(ActorRef) returns (ActorRecord);
  // Checkpoint captures the actor's state as an immutable checkpoint artifact.
  rpc Checkpoint(CheckpointActorRequest) returns (ActorCheckpoint);
  // Restore atomically restores an actor from a compatible checkpoint.
  rpc Restore(RestoreActorRequest) returns (ActorRecord);
  // Fork creates a new actor identity from an immutable checkpoint.
  rpc Fork(ForkActorRequest) returns (ActorRecord);
  // Delete permanently removes an actor identity while retaining referenced artifacts.
  rpc Delete(ActorRef) returns (Ok);
}

// DigestAlgorithm identifies the hash used for content addressing and checksums.
enum DigestAlgorithm {
  // DIGEST_ALGORITHM_UNSPECIFIED is invalid for stored data.
  DIGEST_ALGORITHM_UNSPECIFIED = 0;
  // DIGEST_ALGORITHM_SHA256 is SHA-256 over the uncompressed bytes.
  DIGEST_ALGORITHM_SHA256 = 1;
}

// ValueSerializer identifies the codec used by a ValueEnvelope.
enum ValueSerializer {
  // VALUE_SERIALIZER_UNSPECIFIED indicates that no codec was selected.
  VALUE_SERIALIZER_UNSPECIFIED = 0;
  // VALUE_SERIALIZER_JSON is portable I-JSON UTF-8 with integers restricted to the interoperable safe range.
  VALUE_SERIALIZER_JSON = 1;
  // VALUE_SERIALIZER_CBOR is portable RFC 8949 CBOR.
  VALUE_SERIALIZER_CBOR = 2;
  // VALUE_SERIALIZER_CLOUDPICKLE is trusted Python-only executable data.
  VALUE_SERIALIZER_CLOUDPICKLE = 3;
}

// ValueCompression identifies compression applied after value serialization.
enum ValueCompression {
  // VALUE_COMPRESSION_NONE leaves serialized bytes uncompressed.
  VALUE_COMPRESSION_NONE = 0;
  // VALUE_COMPRESSION_GZIP applies the gzip format.
  VALUE_COMPRESSION_GZIP = 1;
  // VALUE_COMPRESSION_ZSTD applies the Zstandard format.
  VALUE_COMPRESSION_ZSTD = 2;
}

// FunctionLifecycle identifies how worker state is reused between calls.
enum FunctionLifecycle {
  // FUNCTION_LIFECYCLE_UNSPECIFIED selects the platform default.
  FUNCTION_LIFECYCLE_UNSPECIFIED = 0;
  // FUNCTION_LIFECYCLE_STATELESS permits reuse without retained user state.
  FUNCTION_LIFECYCLE_STATELESS = 1;
  // FUNCTION_LIFECYCLE_INSTANCE retains state for the lifetime of a worker.
  FUNCTION_LIFECYCLE_INSTANCE = 2;
  // FUNCTION_LIFECYCLE_ACTOR requires calls to target a durable actor.
  FUNCTION_LIFECYCLE_ACTOR = 3;
}

// PackageMode identifies how Python callable code is loaded.
enum PackageMode {
  // PACKAGE_MODE_UNSPECIFIED indicates an invalid package mode.
  PACKAGE_MODE_UNSPECIFIED = 0;
  // PACKAGE_MODE_MODULE imports a callable from a single Python module.
  PACKAGE_MODE_MODULE = 1;
  // PACKAGE_MODE_PACKAGE imports a callable from an installed Python package.
  PACKAGE_MODE_PACKAGE = 2;
  // PACKAGE_MODE_TRUSTED_SERIALIZED loads trusted Python-only serialized code.
  PACKAGE_MODE_TRUSTED_SERIALIZED = 3;
}

// CpuArchitecture identifies the required worker instruction-set architecture.
enum CpuArchitecture {
  // CPU_ARCHITECTURE_UNSPECIFIED permits the platform default architecture.
  CPU_ARCHITECTURE_UNSPECIFIED = 0;
  // CPU_ARCHITECTURE_AMD64 requires x86-64 workers.
  CPU_ARCHITECTURE_AMD64 = 1;
  // CPU_ARCHITECTURE_ARM64 requires AArch64 workers.
  CPU_ARCHITECTURE_ARM64 = 2;
}

// HighAvailabilityPolicy identifies worker placement redundancy.
enum HighAvailabilityPolicy {
  // HIGH_AVAILABILITY_POLICY_UNSPECIFIED selects the platform default.
  HIGH_AVAILABILITY_POLICY_UNSPECIFIED = 0;
  // HIGH_AVAILABILITY_POLICY_NONE makes no cross-host redundancy guarantee.
  HIGH_AVAILABILITY_POLICY_NONE = 1;
  // HIGH_AVAILABILITY_POLICY_HOST spreads workers across physical hosts.
  HIGH_AVAILABILITY_POLICY_HOST = 2;
  // HIGH_AVAILABILITY_POLICY_ZONE spreads workers across availability zones.
  HIGH_AVAILABILITY_POLICY_ZONE = 3;
}



// CallType identifies the execution and result-indexing model of a call.
enum CallType {
  // CALL_TYPE_UNSPECIFIED indicates an invalid call type.
  CALL_TYPE_UNSPECIFIED = 0;
  // CALL_TYPE_UNARY consumes one input and produces one result.
  CALL_TYPE_UNARY = 1;
  // CALL_TYPE_GENERATOR consumes one input and produces indexed yields.
  CALL_TYPE_GENERATOR = 2;
  // CALL_TYPE_BATCH consumes independently indexed inputs and produces indexed results.
  CALL_TYPE_BATCH = 3;
  // CALL_TYPE_ACTOR invokes a method on a durable actor.
  CALL_TYPE_ACTOR = 4;
}

// CallStatus is the durable lifecycle state of a call.
enum CallStatus {
  // CALL_STATUS_UNSPECIFIED indicates corrupt or unknown state.
  CALL_STATUS_UNSPECIFIED = 0;
  // CALL_STATUS_PENDING means the call is persisted but not yet queued.
  CALL_STATUS_PENDING = 1;
  // CALL_STATUS_QUEUED means the call is eligible for worker assignment.
  CALL_STATUS_QUEUED = 2;
  // CALL_STATUS_RUNNING means at least one attempt is executing.
  CALL_STATUS_RUNNING = 3;
  // CALL_STATUS_SUCCEEDED means all required results were committed.
  CALL_STATUS_SUCCEEDED = 4;
  // CALL_STATUS_FAILED means execution ended with a non-retryable error.
  CALL_STATUS_FAILED = 5;
  // CALL_STATUS_CANCELLING means cancellation was requested but is not complete.
  CALL_STATUS_CANCELLING = 6;
  // CALL_STATUS_CANCELLED means unfinished execution was cancelled.
  CALL_STATUS_CANCELLED = 7;
}

// CallEventType identifies a durable event in a call's ordered event log.
enum CallEventType {
  // CALL_EVENT_TYPE_UNSPECIFIED indicates an invalid event.
  CALL_EVENT_TYPE_UNSPECIFIED = 0;
  // CALL_EVENT_TYPE_STATUS records a call status transition.
  CALL_EVENT_TYPE_STATUS = 1;
  // CALL_EVENT_TYPE_LOG records stdout, stderr, or structured worker logging.
  CALL_EVENT_TYPE_LOG = 2;
  // CALL_EVENT_TYPE_YIELD records an indexed generator yield.
  CALL_EVENT_TYPE_YIELD = 3;
  // CALL_EVENT_TYPE_RESULT records an indexed final result.
  CALL_EVENT_TYPE_RESULT = 4;
  // CALL_EVENT_TYPE_ATTEMPT records the start or completion of an attempt.
  CALL_EVENT_TYPE_ATTEMPT = 5;
  // CALL_EVENT_TYPE_ERROR records a structured execution error.
  CALL_EVENT_TYPE_ERROR = 6;
  // CALL_EVENT_TYPE_INPUT_CLOSED records completion of streamed inputs.
  CALL_EVENT_TYPE_INPUT_CLOSED = 7;
  // CALL_EVENT_TYPE_CANCEL_REQUESTED records a durable cancellation request.
  CALL_EVENT_TYPE_CANCEL_REQUESTED = 8;
}

// LogStream identifies the source of a call log entry.
enum LogStream {
  // LOG_STREAM_UNSPECIFIED indicates an unknown log source.
  LOG_STREAM_UNSPECIFIED = 0;
  // LOG_STREAM_STDOUT is process standard output.
  LOG_STREAM_STDOUT = 1;
  // LOG_STREAM_STDERR is process standard error.
  LOG_STREAM_STDERR = 2;
  // LOG_STREAM_STRUCTURED is a structured application log.
  LOG_STREAM_STRUCTURED = 3;
}

// AttemptStatus identifies the state of one execution attempt.
enum AttemptStatus {
  // ATTEMPT_STATUS_UNSPECIFIED indicates an unknown attempt state.
  ATTEMPT_STATUS_UNSPECIFIED = 0;
  // ATTEMPT_STATUS_STARTED means the worker accepted the attempt.
  ATTEMPT_STATUS_STARTED = 1;
  // ATTEMPT_STATUS_SUCCEEDED means the attempt committed its result.
  ATTEMPT_STATUS_SUCCEEDED = 2;
  // ATTEMPT_STATUS_FAILED means the attempt ended with an error.
  ATTEMPT_STATUS_FAILED = 3;
  // ATTEMPT_STATUS_CANCELLED means the attempt stopped due to cancellation.
  ATTEMPT_STATUS_CANCELLED = 4;
}

// StartupKind describes how a worker was prepared for an attempt.
enum StartupKind {
  // STARTUP_KIND_UNSPECIFIED means startup information is unavailable.
  STARTUP_KIND_UNSPECIFIED = 0;
  // STARTUP_KIND_COLD created and booted a new worker.
  STARTUP_KIND_COLD = 1;
  // STARTUP_KIND_WARM reused an initialized worker.
  STARTUP_KIND_WARM = 2;
  // STARTUP_KIND_SNAPSHOT restored a worker from a snapshot.
  STARTUP_KIND_SNAPSHOT = 3;
}

// ActorStatus identifies the durable lifecycle state of an actor.
enum ActorStatus {
  // ACTOR_STATUS_UNSPECIFIED indicates an unknown actor state.
  ACTOR_STATUS_UNSPECIFIED = 0;
  // ACTOR_STATUS_CREATING means actor creation is not yet complete.
  ACTOR_STATUS_CREATING = 1;
  // ACTOR_STATUS_READY means the actor accepts calls.
  ACTOR_STATUS_READY = 2;
  // ACTOR_STATUS_BUSY means the actor is executing a serialized call.
  ACTOR_STATUS_BUSY = 3;
  // ACTOR_STATUS_STOPPED means the actor is durable but has no active worker.
  ACTOR_STATUS_STOPPED = 4;
  // ACTOR_STATUS_FAILED means actor recovery requires intervention.
  ACTOR_STATUS_FAILED = 5;
  // ACTOR_STATUS_DELETED means the actor identity was deleted.
  ACTOR_STATUS_DELETED = 6;
}

// ScheduleStatus identifies whether a schedule may create calls.
enum ScheduleStatus {
  // SCHEDULE_STATUS_UNSPECIFIED indicates invalid schedule state.
  SCHEDULE_STATUS_UNSPECIFIED = 0;
  // SCHEDULE_STATUS_ACTIVE permits new scheduled calls.
  SCHEDULE_STATUS_ACTIVE = 1;
  // SCHEDULE_STATUS_PAUSED suppresses new scheduled calls.
  SCHEDULE_STATUS_PAUSED = 2;
}

// Digest is a typed cryptographic digest.
message Digest {
  // Algorithm identifies how value was computed.
  DigestAlgorithm algorithm = 1;
  // Value contains the raw digest bytes, not hexadecimal text.
  bytes value = 2;
}

// ArtifactRef is a stable reference to immutable content.
message ArtifactRef {
  // Digest addresses the artifact by its uncompressed content.
  Digest digest = 1;
}

// ArtifactRecord describes an immutable stored artifact.
message ArtifactRecord {
  // Ref is the artifact's content-addressed identity.
  ArtifactRef ref = 1;
  // SizeBytes is the number of uncompressed content bytes.
  uint64 size_bytes = 2;
  // StoredSizeBytes is the number of bytes occupied after storage compression.
  uint64 stored_size_bytes = 3;
  // MediaType is the optional IANA media type, represented explicitly when known.
  oneof media_type_presence {
    // MediaType is the supplied IANA media type.
    string media_type = 4;
  }
  // CreatedAtUnixMillis is the server commit time in Unix milliseconds.
  uint64 created_at_unix_millis = 5;
  // ExpiresAtUnixMillis is present when the artifact has a retention deadline.
  oneof expires_at_unix_millis_presence {
    // ExpiresAtUnixMillis is the artifact expiration time in Unix milliseconds.
    uint64 expires_at_unix_millis = 6;
  }
}

// PutArtifactHeader declares metadata that must precede uploaded chunks.
message PutArtifactHeader {
  // ExpectedDigest is verified before the artifact is committed.
  Digest expected_digest = 1;
  // ExpectedSizeBytes is the exact uncompressed upload size.
  uint64 expected_size_bytes = 2;
  // MediaType is present only when the uploader supplies one.
  oneof media_type_presence {
    // MediaType is the supplied IANA media type.
    string media_type = 3;
  }
  // TtlMillis is present to request expiration relative to the commit time.
  oneof ttl_millis_presence {
    // TtlMillis is the requested artifact retention duration.
    uint64 ttl_millis = 4;
  }
}

// PutArtifactRequest is one frame of an artifact upload.
message PutArtifactRequest {
  // Frame contains exactly one header or data chunk.
  oneof frame {
    // Header must be the first frame in the stream.
    PutArtifactHeader header = 1;
    // Data contains the next ordered bytes of artifact content.
    bytes data = 2;
  }
}

// GetArtifactRequest selects an artifact and optional byte range.
message GetArtifactRequest {
  // Artifact identifies the immutable content to download.
  ArtifactRef artifact = 1;
  // Range is absent to download the complete artifact.
  oneof range_presence {
    // Range limits the returned uncompressed byte sequence.
    ByteRange range = 2;
  }
}

// ByteRange is a half-open byte range.
message ByteRange {
  // Offset is the zero-based first byte.
  uint64 offset = 1;
  // Length is the number of bytes to return.
  uint64 length = 2;
}

// ArtifactChunk is one ordered frame of an artifact download.
message ArtifactChunk {
  // Offset is the zero-based offset of data in the uncompressed artifact.
  uint64 offset = 1;
  // Data contains contiguous artifact bytes.
  bytes data = 2;
  // Eof is true only on the final frame.
  bool eof = 3;
}

// PythonCodecMetadata constrains trusted Python-only deserialization.
message PythonCodecMetadata {
  // Implementation is the interpreter implementation, such as CPython.
  string implementation = 1;
  // AbiTag is the Python ABI tag, such as cp312.
  string abi_tag = 2;
  // PythonVersion is the producer's full Python version.
  string python_version = 3;
  // CloudpickleVersion is required for cloudpickle values.
  string cloudpickle_version = 4;
}

// ValueEnvelope is a versioned, checksummed, compressed inline-or-artifact value.
message ValueEnvelope {
  // SchemaVersion identifies this envelope layout and interpretation.
  uint32 schema_version = 1;
  // Serializer identifies the serialized value codec.
  ValueSerializer serializer = 2;
  // Compression identifies compression applied to serialized bytes.
  ValueCompression compression = 3;
  // Checksum covers the uncompressed serialized bytes.
  Digest checksum = 4;
  // UncompressedSizeBytes is the exact serialized size before compression.
  uint64 uncompressed_size_bytes = 5;
  // Storage contains either compressed inline bytes or an artifact holding those bytes.
  oneof storage {
    // InlineData contains the complete serialized payload after compression.
    bytes inline_data = 6;
    // Artifact points to the complete serialized payload after compression.
    ArtifactRef artifact = 7;
  }
  // Python is present only for trusted Python-only serializers such as cloudpickle.
  oneof python_presence {
    // Python records interpreter ABI and codec compatibility.
    PythonCodecMetadata python = 8;
  }
  // TypeName is present when the producer supplies a diagnostic logical type.
  oneof type_name_presence {
    // TypeName is a language-neutral diagnostic type name.
    string type_name = 9;
  }
}

// FunctionRef identifies a logical function by namespace and name.
message FunctionRef {
  // Namespace scopes the function name.
  string namespace = 1;
  // Name is the logical function name.
  string name = 2;
}

// RevisionRef pins an immutable function revision.
message RevisionRef {
  // Function identifies the logical function.
  FunctionRef function = 1;
  // RevisionId is the immutable server-assigned revision identifier.
  string revision_id = 2;
}

// FunctionSelector explicitly chooses current or pinned revision lookup.
message FunctionSelector {
  // Selection contains exactly one lookup mode.
  oneof selection {
    // Current resolves the function's active revision at lookup time.
    FunctionRef current = 1;
    // Pinned resolves exactly one immutable revision.
    RevisionRef pinned = 2;
  }
}

// AppRef identifies a logical application.
message AppRef {
  // Namespace scopes the application name.
  string namespace = 1;
  // Name is the logical application name.
  string name = 2;
}

// AppRevisionRef pins an immutable application revision.
message AppRevisionRef {
  // App identifies the logical application.
  AppRef app = 1;
  // RevisionId is the immutable application revision identifier.
  string revision_id = 2;
}

// AppSelector explicitly chooses current or pinned application lookup.
message AppSelector {
  // Selection contains exactly one lookup mode.
  oneof selection {
    // Current resolves the application's active revision at lookup time.
    AppRef current = 1;
    // Pinned resolves exactly one immutable application revision.
    AppRevisionRef pinned = 2;
  }
}

// PackageSpec identifies reproducible function source and dependencies.
message PackageSpec {
  // Source is an immutable archive, wheel, module, or trusted serialized bundle.
  ArtifactRef source = 1;
  // Module is the importable Python module or package name.
  string module = 2;
  // Lockfile is present when dependencies are pinned in a separate artifact.
  oneof lockfile_presence {
    // Lockfile is an immutable dependency lock artifact.
    ArtifactRef lockfile = 3;
  }
  // ContentDigest covers the normalized package inputs used by the builder.
  Digest content_digest = 4;
  // Mode controls whether code is imported or trusted-deserialized.
  PackageMode mode = 5;
  // Qualname is the callable's qualified name within module.
  string qualname = 6;
  // Python records interpreter and trusted-code compatibility.
  PythonCodeMetadata python = 7;
  // IncludedPaths lists exact source-relative paths included in the package.
  repeated string included_paths = 8;
  // IncludeGlobs adds source-relative paths matching these deterministic globs.
  repeated string include_globs = 9;
  // ExcludeGlobs removes source-relative paths matching these deterministic globs.
  repeated string exclude_globs = 10;
}

// ImageSpec identifies a reproducible worker image.
message ImageSpec {
  // Source contains exactly one typed base-image or build source.
  oneof source {
    // Python uses a platform-maintained Python base image.
    PythonImageSource python = 1;
    // Registry uses an OCI registry reference.
    RegistryImageSource registry = 2;
    // Dockerfile builds an immutable context with a Dockerfile.
    DockerfileImageSource dockerfile = 3;
    // Template uses an immutable platform image template.
    TemplateImageSource template = 4;
  }
  // AptPackages contains version-pinned system packages.
  repeated AptPackage apt_packages = 5;
  // UvPackages contains version-pinned Python packages.
  repeated UvPackage uv_packages = 6;
  // Commands are deterministic build commands executed in order.
  repeated ImageBuildCommand commands = 7;
  // Environment contains non-secret runtime environment variables.
  map<string, string> environment = 8;
  // LocalArtifactMounts inject immutable artifacts into the image build.
  repeated LocalArtifactMount local_artifact_mounts = 9;
  // ResolvedOciDigest is the immutable manifest digest produced or resolved by registration.
  Digest resolved_oci_digest = 10;
  // Platform is the resolved OCI platform string, such as linux/arm64.
  string platform = 11;
}

// ResourceSpec declares per-worker resource limits.
message ResourceSpec {
  // Cpus is the required number of whole virtual CPUs.
  uint32 cpus = 1;
  // MemoryBytes is the worker memory limit.
  uint64 memory_bytes = 2;
  // EphemeralDiskBytes is the writable ephemeral disk limit.
  uint64 ephemeral_disk_bytes = 3;
  // Architecture constrains the worker instruction-set architecture.
  CpuArchitecture architecture = 4;
  // HighAvailability controls worker placement redundancy.
  HighAvailabilityPolicy high_availability = 5;
  // VolumeMounts declares typed persistent volume attachments.
  repeated FunctionVolumeMount volume_mounts = 6;
  // Network controls outbound connectivity.
  NetworkPolicy network = 7;
}

// PythonCodeMetadata constrains imported or trusted-serialized Python code.
message PythonCodeMetadata {
  // Implementation is the interpreter implementation, such as CPython.
  string implementation = 1;
  // Version is the exact Python runtime version.
  string version = 2;
  // AbiTag is the Python ABI tag, such as cp312.
  string abi_tag = 3;
  // BytecodeMagic is the interpreter bytecode magic number when bytecode is included.
  bytes bytecode_magic = 4;
  // CloudpickleVersion is present for trusted serialized package mode.
  oneof cloudpickle_version_presence {
    // CloudpickleVersion is the exact trusted serializer version.
    string cloudpickle_version = 5;
  }
}

// PythonImageSource selects a platform-maintained Python runtime image.
message PythonImageSource {
  // PythonVersion is the exact Python release.
  string python_version = 1;
  // Variant is the maintained image variant, such as slim.
  string variant = 2;
}

// RegistryImageSource selects an OCI image by human-readable reference.
message RegistryImageSource {
  // Reference is the OCI registry reference supplied by the caller.
  string reference = 1;
}

// DockerfileImageSource selects an immutable build context and Dockerfile.
message DockerfileImageSource {
  // Context is the content-addressed build context archive.
  ArtifactRef context = 1;
  // DockerfilePath is the source-relative Dockerfile location.
  string dockerfile_path = 2;
}

// TemplateImageSource selects an immutable platform template revision.
message TemplateImageSource {
  // Name is the platform template name.
  string name = 1;
  // Revision is the immutable template revision.
  string revision = 2;
}

// AptPackage is one immutable system package requirement.
message AptPackage {
  // Name is the Debian package name.
  string name = 1;
  // Version is the exact package version.
  string version = 2;
}

// UvPackage is one immutable Python package requirement.
message UvPackage {
  // Name is the normalized Python distribution name.
  string name = 1;
  // Version is the exact distribution version.
  string version = 2;
  // IndexUrl is present for a non-default immutable package index.
  oneof index_url_presence {
    // IndexUrl is the package index base URL.
    string index_url = 3;
  }
}

// ImageBuildCommand is one deterministic argv-based build command.
message ImageBuildCommand {
  // Argv contains the executable followed by its arguments.
  repeated string argv = 1;
}

// LocalArtifactMount injects immutable content into an image build.
message LocalArtifactMount {
  // Artifact identifies the immutable mounted content.
  ArtifactRef artifact = 1;
  // Path is the absolute build-container destination.
  string path = 2;
  // ReadOnly prevents build commands from mutating the mounted content.
  bool read_only = 3;
}

// FunctionVolumeMount attaches a persistent volume to workers.
message FunctionVolumeMount {
  // Volume identifies the persistent volume.
  VolumeRef volume = 1;
  // MountPath is the absolute guest path.
  string mount_path = 2;
  // ReadOnly prevents worker writes.
  bool read_only = 3;
}


// NetworkPolicy is a default-deny typed outbound policy.
message NetworkPolicy {
  // BlockNetwork denies all network traffic regardless of allowlists when true.
  bool block_network = 1;
  // EgressCidrs contains allowed outbound IPv4 or IPv6 CIDRs.
  repeated string egress_cidrs = 2;
  // EgressDomains contains allowed exact DNS names or leading-wildcard suffixes.
  repeated string egress_domains = 3;
  // InboundCidrs contains source CIDRs permitted to reach exposed worker ports.
  repeated string inbound_cidrs = 4;
}

// RetryPolicy controls bounded retries for failed attempts.
message RetryPolicy {
  // MaxAttempts includes the initial attempt and must be at least one.
  uint32 max_attempts = 1;
  // InitialBackoffMillis is the delay before the first retry.
  uint64 initial_backoff_millis = 2;
  // MaxBackoffMillis caps exponential backoff.
  uint64 max_backoff_millis = 3;
  // BackoffMultiplier scales delay after each retry.
  double backoff_multiplier = 4;
  // RetryableCodes contains stable application or platform error codes.
  repeated string retryable_codes = 5;
}

// TimeoutSpec declares call and worker lifecycle time limits.
message TimeoutSpec {
  // ExecutionMillis limits one attempt's user execution.
  uint64 execution_millis = 1;
  // QueueMillis limits time waiting for worker assignment.
  uint64 queue_millis = 2;
  // StartupMillis limits worker preparation.
  uint64 startup_millis = 3;
  // GracefulShutdownMillis limits cooperative worker shutdown.
  uint64 graceful_shutdown_millis = 4;
  // ResultTtlMillis controls durable result retention after terminal completion.
  uint64 result_ttl_millis = 5;
}

// WorkerSpec controls worker pool sizing and reuse.
message WorkerSpec {
  // MinWorkers is the minimum number of retained workers.
  uint32 min_workers = 1;
  // MaxWorkers is the maximum number of concurrent workers.
  uint32 max_workers = 2;
  // IdleTimeoutMillis controls when an idle worker may be stopped.
  uint64 idle_timeout_millis = 3;
  // MaxCallsPerWorker retires workers after this many calls; zero means unlimited.
  uint64 max_calls_per_worker = 4;
  // BufferWorkers is the number of additional prewarmed workers retained for bursts.
  uint32 buffer_workers = 5;
  // MaxOutstandingInputs bounds queued and executing inputs per worker.
  uint32 max_outstanding_inputs = 6;
}

// ConcurrencySpec controls admission within one worker.
message ConcurrencySpec {
  // MaxConcurrentCalls is the maximum admitted calls per worker.
  uint32 max_concurrent_calls = 1;
  // SerializeActorCalls forces actor calls to execute one at a time.
  bool serialize_actor_calls = 2;
}

// BatchingSpec controls automatic input batching.
message BatchingSpec {
  // Enabled permits multiple indexed inputs in one worker invocation.
  bool enabled = 1;
  // MaxBatchSize is the largest worker batch.
  uint32 max_batch_size = 2;
  // MaxWaitMillis bounds collection latency for a partial batch.
  uint64 max_wait_millis = 3;
}

// SerializerSpec declares accepted inputs and emitted results.
message SerializerSpec {
  // InputSerializer is the required input codec.
  ValueSerializer input_serializer = 1;
  // ResultSerializer is the required result codec.
  ValueSerializer result_serializer = 2;
  // Compression is the preferred envelope compression.
  ValueCompression compression = 3;
  // AllowTrustedPython permits Python-only cloudpickle deserialization.
  bool allow_trusted_python = 4;
}

// ReproducibilitySpec records immutable build provenance.
message ReproducibilitySpec {
  // BuildInputsDigest covers all normalized build inputs.
  Digest build_inputs_digest = 1;
  // BuilderId identifies the builder implementation.
  string builder_id = 2;
  // BuilderVersion identifies the exact builder release.
  string builder_version = 3;
  // SourceDateEpoch is the Unix seconds used for reproducible timestamps.
  uint64 source_date_epoch = 4;
  // Environment contains sorted, non-secret reproducibility inputs.
  map<string, string> environment = 5;
}

// FunctionRevisionStatus describes whether a registered revision can execute.
enum FunctionRevisionStatus {
  // FUNCTION_REVISION_STATUS_UNSPECIFIED indicates unknown revision availability.
  FUNCTION_REVISION_STATUS_UNSPECIFIED = 0;
  // FUNCTION_REVISION_STATUS_READY means all persisted dependencies are resolvable.
  FUNCTION_REVISION_STATUS_READY = 1;
  // FUNCTION_REVISION_STATUS_UNAVAILABLE means one or more persisted dependencies cannot be resolved.
  FUNCTION_REVISION_STATUS_UNAVAILABLE = 2;
}

// SecretRef is a persisted name and optional immutable version, never secret material.
message SecretRef {
  // Name identifies the secret in the configured secret provider.
  string name = 1;
  // Version is present when the function pins a provider-specific secret version.
  oneof version_presence {
    // Version is the immutable provider-specific version identifier.
    string version = 2;
  }
}

// TransientSecretMaterial carries registration-only secret bytes and is never persisted.
message TransientSecretMaterial {
  // Secret identifies the persisted reference fulfilled by this material.
  SecretRef secret = 1;
  // Value is sensitive plaintext accepted only during registration.
  bytes value = 2;
}

// LifecycleHookRef identifies a callable lifecycle hook without embedding code.
message LifecycleHookRef {
  // Module is the importable Python module containing the hook.
  string module = 1;
  // Qualname is the hook's qualified callable name.
  string qualname = 2;
}

// LifecycleHooks declares typed worker hooks and snapshot behavior.
message LifecycleHooks {
  // Initialize is present when workers run an initialization hook before calls.
  oneof initialize_presence {
    // Initialize identifies the worker initialization hook.
    LifecycleHookRef initialize = 1;
  }
  // Shutdown is present when workers run a graceful shutdown hook.
  oneof shutdown_presence {
    // Shutdown identifies the graceful worker shutdown hook.
    LifecycleHookRef shutdown = 2;
  }
  // Snapshot is present when user state requires a pre-snapshot hook.
  oneof snapshot_presence {
    // Snapshot identifies the pre-snapshot hook.
    LifecycleHookRef snapshot = 3;
  }
  // Restore is present when restored user state requires a post-restore hook.
  oneof restore_presence {
    // Restore identifies the post-restore hook.
    LifecycleHookRef restore = 4;
  }
  // SnapshotAfterInitialize requests a reusable snapshot after initialization.
  bool snapshot_after_initialize = 5;
  // SnapshotOnWorkerRetire requests a recovery snapshot before worker retirement.
  bool snapshot_on_worker_retire = 6;
}

// FunctionSnapshotRef identifies a persisted worker snapshot.
message FunctionSnapshotRef {
  // SnapshotId is the stable server-assigned snapshot identifier.
  string snapshot_id = 1;
}
 
// FunctionSnapshotRecord is a persisted, reloadable worker snapshot with validation provenance.
message FunctionSnapshotRecord {
  // Ref identifies the persisted function snapshot.
  FunctionSnapshotRef ref = 1;
  // Revision pins the function revision represented by the snapshot.
  RevisionRef revision = 2;
  // Artifact contains the immutable worker snapshot bytes.
  ArtifactRef artifact = 3;
  // ProtocolVersion is the snapshot protocol version required by the loader.
  uint32 protocol_version = 4;
  // RunnerDigest pins the runner binary or package that created and must validate the snapshot.
  Digest runner_digest = 5;
  // ImageDigest pins the OCI image used to create the snapshot.
  Digest image_digest = 6;
  // PackageDigest pins the normalized function package.
  Digest package_digest = 7;
  // CreatedAtUnixMillis is the snapshot commit time.
  uint64 created_at_unix_millis = 8;
  // InitializeHook is present when snapshot creation ran an initialization hook.
  oneof initialize_hook_presence {
    // InitializeHook identifies the hook used to prepare snapshot state.
    LifecycleHookRef initialize_hook = 9;
  }
}

// FunctionSpec fully describes an immutable executable function revision.
message FunctionSpec {
  // Function is the logical identity receiving this revision.
  FunctionRef function = 1;
  // Package identifies immutable source and dependencies.
  PackageSpec package = 2;
  // Image identifies the immutable runtime image.
  ImageSpec image = 3;
  // Resources declares per-worker resource limits.
  ResourceSpec resources = 4;
  // Retry controls bounded execution retries.
  RetryPolicy retry = 5;
  // Timeouts controls queue, startup, execution, and shutdown limits.
  TimeoutSpec timeouts = 6;
  // Workers controls pool sizing and reuse.
  WorkerSpec workers = 7;
  // Concurrency controls per-worker admission.
  ConcurrencySpec concurrency = 8;
  // Batching controls automatic batch formation.
  BatchingSpec batching = 9;
  // Serializer declares the wire value codecs.
  SerializerSpec serializer = 10;
  // Lifecycle declares state reuse semantics.
  FunctionLifecycle lifecycle = 11;
  // Reproducibility records immutable build provenance.
  ReproducibilitySpec reproducibility = 12;
  // Labels are user-defined lookup metadata.
  map<string, string> labels = 13;
  // Secrets contains only persisted names and versions, never secret material.
  repeated SecretRef secrets = 14;
  // LifecycleHooks names worker hooks and controls reusable snapshots.
  LifecycleHooks lifecycle_hooks = 15;
}

// FunctionRevision is one immutable registered function revision.
message FunctionRevision {
  // Ref pins this immutable revision.
  RevisionRef ref = 1;
  // Spec is the complete typed revision specification.
  FunctionSpec spec = 2;
  // SpecDigest identifies the canonical encoded specification.
  Digest spec_digest = 3;
  // CreatedAtUnixMillis is the registration time.
  uint64 created_at_unix_millis = 4;
  // Status remains unavailable across restart when persisted dependencies cannot be resolved.
  FunctionRevisionStatus status = 5;
  // UnavailableSecrets lists persisted references that currently cannot be resolved.
  repeated SecretRef unavailable_secrets = 6;
  // Snapshot is present when registration produced a persisted reusable worker snapshot.
  oneof snapshot_presence {
    // Snapshot contains reload and validation provenance.
    FunctionSnapshotRecord snapshot = 7;
  }
}

// FunctionRecord describes a logical function and its active revision.
message FunctionRecord {
  // Function is the logical function identity.
  FunctionRef function = 1;
  // Current is the atomically active immutable revision.
  RevisionRef current = 2;
  // UpdatedAtUnixMillis is the most recent activation time.
  uint64 updated_at_unix_millis = 3;
}

// RegisterFunctionRequest registers an immutable function specification.
message RegisterFunctionRequest {
  // Spec is the fully typed revision to register.
  FunctionSpec spec = 1;
  // RequestId provides idempotency for retried registration.
  string request_id = 2;
  // TransientSecrets is registration-only plaintext and MUST NOT enter the revision or logs.
  repeated TransientSecretMaterial transient_secrets = 3;
}

// GetFunctionRequest resolves a current or pinned function selector.
message GetFunctionRequest {
  // Function selects the requested immutable revision.
  FunctionSelector function = 1;
}

// ListFunctionsRequest filters and paginates function revisions.
message ListFunctionsRequest {
  // Namespace is present only when results should be namespace-scoped.
  oneof namespace_presence {
    // Namespace limits results to one namespace.
    string namespace = 1;
  }
  // Function is present only when revisions of one function are requested.
  oneof function_presence {
    // Function limits results to one logical function.
    FunctionRef function = 2;
  }
  // PageSize is the maximum result count; zero selects the server default.
  uint32 page_size = 3;
  // PageToken continues a prior stable listing.
  string page_token = 4;
}

// ListFunctionsResponse contains immutable function revisions.
message ListFunctionsResponse {
  // Revisions are ordered by creation time and revision identifier.
  repeated FunctionRevision revisions = 1;
  // NextPageToken is empty when no more revisions remain.
  string next_page_token = 2;
}

// ActivateFunctionRequest atomically changes a function's current revision.
message ActivateFunctionRequest {
  // Revision is the immutable revision to activate.
  RevisionRef revision = 1;
  // ExpectedCurrent is present for compare-and-swap activation.
  oneof expected_current_presence {
    // ExpectedCurrent must match the active revision.
    RevisionRef expected_current = 2;
  }
}

// DeleteFunctionRequest selects an inactive immutable revision for deletion.
message DeleteFunctionRequest {
  // Revision is the immutable revision to remove.
  RevisionRef revision = 1;
}

// AppFunctionBinding maps an application route to a pinned function revision.
message AppFunctionBinding {
  // Name is the application-local binding name.
  string name = 1;
  // Revision pins the exact function implementation.
  RevisionRef revision = 2;
}

// AppRevision is an immutable, atomically published application configuration.
message AppRevision {
  // Ref pins the application revision.
  AppRevisionRef ref = 1;
  // Functions is the complete set of pinned bindings.
  repeated AppFunctionBinding functions = 2;
  // ContentDigest covers the canonical ordered bindings.
  Digest content_digest = 3;
  // CreatedAtUnixMillis is the publication time.
  uint64 created_at_unix_millis = 4;
  // Previous identifies the revision that was current before this activation.
  oneof previous_presence {
    // Previous is the prior current application revision.
    AppRevisionRef previous = 5;
  }
}

// ActivateAppRequest atomically publishes a complete application revision.
message ActivateAppRequest {
  // App is the logical application receiving the revision.
  AppRef app = 1;
  // Functions is the complete desired set of pinned bindings.
  repeated AppFunctionBinding functions = 2;
  // ExpectedCurrent is present for compare-and-swap publication.
  oneof expected_current_presence {
    // ExpectedCurrent must match the current application revision.
    AppRevisionRef expected_current = 3;
  }
  // RequestId provides idempotency for retried activation.
  string request_id = 4;
}

// GetAppRequest resolves a current or pinned application selector.
message GetAppRequest {
  // App selects the requested immutable application revision.
  AppSelector app = 1;
}

// RollbackAppRequest atomically restores a prior application revision.
message RollbackAppRequest {
  // Target is the prior immutable revision to restore.
  AppRevisionRef target = 1;
  // ExpectedCurrent is present for compare-and-swap rollback.
  oneof expected_current_presence {
    // ExpectedCurrent must match the current application revision.
    AppRevisionRef expected_current = 2;
  }
  // RequestId provides idempotency for retried rollback.
  string request_id = 3;
}

// ScheduleRef identifies a durable schedule.
message ScheduleRef {
  // ScheduleId is the stable server-assigned identifier.
  string schedule_id = 1;
}

// CronSchedule triggers according to a cron expression and time zone.
message CronSchedule {
  // Expression is a standard five-field cron expression.
  string expression = 1;
  // TimeZone is an IANA time-zone identifier.
  string time_zone = 2;
}

// PeriodSchedule triggers at a fixed period from a stable anchor.
message PeriodSchedule {
  // PeriodMillis is the positive interval between triggers.
  uint64 period_millis = 1;
  // AnchorUnixMillis fixes phase and must not change after creation.
  uint64 anchor_unix_millis = 2;
}

// ScheduleTarget identifies the pinned function and input for scheduled calls.
message ScheduleTarget {
  // Function pins the immutable function revision.
  RevisionRef function = 1;
  // Input is the value supplied to each scheduled unary call.
  ValueEnvelope input = 2;
}

// ScheduleSpec is a typed cron or fixed-period schedule definition.
message ScheduleSpec {
  // Name is a user-visible schedule name.
  string name = 1;
  // App pins the application revision associated with the schedule.
  AppRevisionRef app = 2;
  // Target pins the function and input.
  ScheduleTarget target = 3;
  // Timing contains exactly one trigger model.
  oneof timing {
    // Cron uses calendar-based triggering.
    CronSchedule cron = 4;
    // Period uses fixed-duration triggering.
    PeriodSchedule period = 5;
  }
  // Status controls whether triggers create calls.
  ScheduleStatus status = 6;
  // Labels are user-defined lookup metadata.
  map<string, string> labels = 7;
}

// ScheduleRecord is the durable state of a schedule.
message ScheduleRecord {
  // Ref identifies the schedule.
  ScheduleRef ref = 1;
  // Spec is the complete typed definition.
  ScheduleSpec spec = 2;
  // CreatedAtUnixMillis is the first commit time.
  uint64 created_at_unix_millis = 3;
  // UpdatedAtUnixMillis is the most recent replacement time.
  uint64 updated_at_unix_millis = 4;
  // NextRunUnixMillis is present when another trigger is currently computable.
  oneof next_run_presence {
    // NextRunUnixMillis is the next planned trigger.
    uint64 next_run_unix_millis = 5;
  }
}

// CreateScheduleRequest creates or idempotently replaces a schedule.
message CreateScheduleRequest {
  // ScheduleId is present to choose a stable identifier for replacement.
  oneof schedule_id_presence {
    // ScheduleId is the caller-selected stable identifier.
    string schedule_id = 1;
  }
  // Spec is the complete typed schedule.
  ScheduleSpec spec = 2;
  // RequestId provides idempotency for retries.
  string request_id = 3;
}

// ListSchedulesRequest filters and paginates schedules.
message ListSchedulesRequest {
  // App is present to restrict schedules to one logical application.
  oneof app_presence {
    // App limits results to the logical application.
    AppRef app = 1;
  }
  // Function is present to restrict schedules to one logical function.
  oneof function_presence {
    // Function limits results to the logical function.
    FunctionRef function = 2;
  }
  // PageSize is the maximum result count; zero selects the server default.
  uint32 page_size = 3;
  // PageToken continues a prior stable listing.
  string page_token = 4;
}

// ListSchedulesResponse contains durable schedules.
message ListSchedulesResponse {
  // Schedules are ordered by creation time and identifier.
  repeated ScheduleRecord schedules = 1;
  // NextPageToken is empty when no more schedules remain.
  string next_page_token = 2;
}

// CallRef identifies a durable call.
message CallRef {
  // CallId is the stable server-assigned identifier.
  string call_id = 1;
}

// ActorRef identifies a durable actor.
message ActorRef {
  // ActorId is the stable server-assigned identifier.
  string actor_id = 1;
}

// InvocationArguments carries typed positional and named callable arguments.
message InvocationArguments {
  // Positional contains arguments in invocation order.
  repeated ValueEnvelope positional = 1;
  // Named maps parameter names to typed values.
  map<string, ValueEnvelope> named = 2;
}

// ActorTarget invokes a method on an existing durable actor.
message ActorTarget {
  // Actor identifies the durable actor receiver.
  ActorRef actor = 1;
  // Method is the exported actor method name.
  string method = 2;
}

// ServiceTarget invokes a method on a deterministic service instance.
message ServiceTarget {
  // ServiceKey deterministically identifies the service instance.
  string service_key = 1;
  // Method is the exported service method name.
  string method = 2;
  // Constructor contains deterministic arguments used when the service instance is first created.
  InvocationArguments constructor = 3;
}

// ParentEdge identifies the exact parent input that created a child call.
message ParentEdge {
  // CallId identifies the direct parent call.
  string call_id = 1;
  // InputId identifies the direct parent input.
  string input_id = 2;
}

// CallTarget pins the executable and optional typed receiver.
message CallTarget {
  // Function pins the immutable function revision.
  RevisionRef function = 1;
  // Receiver optionally targets a durable actor or deterministic service instance.
  oneof receiver {
    // Actor invokes a method on an existing durable actor.
    ActorTarget actor = 2;
    // Service invokes a method on a deterministic service instance.
    ServiceTarget service = 3;
  }
}

// CallInput is one durable, indexed call input.
message CallInput {
  // Index is zero for unary calls and monotonically increasing for batch inputs.
  uint64 index = 1;
  // Payload contains one scalar value or structured invocation arguments.
  oneof payload {
    // Value is one serialized positional value.
    ValueEnvelope value = 2;
    // Arguments contains positional and named invocation arguments.
    InvocationArguments arguments = 4;
  }
  // InputId is a required stable identifier generated by the client.
  string input_id = 3;
}

// InputRef identifies one durable call input by stable ID and index.
message InputRef {
  // InputId is the required client-generated stable identifier.
  string input_id = 1;
  // InputIndex is the input's zero-based index within the call.
  uint64 input_index = 2;
}

// CallGraph records durable parent relationships between calls.
message CallGraph {
  // Parents contains typed parent call/input edges in deterministic order.
  repeated ParentEdge parents = 1;
  // RootCallId is present for a descendant in a call graph.
  oneof root_call_id_presence {
    // RootCallId identifies the graph root.
    string root_call_id = 2;
  }
}

// CreateCallRequest describes a call that must be persisted before execution.
message CreateCallRequest {
  // Type selects unary, generator, batch, or actor behavior.
  CallType type = 1;
  // Target pins the exact executable and optional actor.
  CallTarget target = 2;
  // Inputs contains initial durable inputs and is empty for streamed batches.
  repeated CallInput inputs = 3;
  // InputsClosed states whether no more inputs will be streamed.
  bool inputs_closed = 4;
  // Graph records direct parents and root identity.
  CallGraph graph = 5;
  // RequestId provides idempotency for retried creation.
  string request_id = 6;
  // Labels are user-defined lookup metadata.
  map<string, string> labels = 7;
  // ResultTtlMillis overrides the function result retention only when present.
  oneof result_ttl_millis_presence {
    // ResultTtlMillis is the per-call durable result retention duration.
    uint64 result_ttl_millis = 9;
  }
}

// CallRecord is the latest durable state of a call.
message CallRecord {
  // Ref identifies the durable call.
  CallRef ref = 1;
  // Type is the call execution model.
  CallType type = 2;
  // Target pins the executable and optional actor.
  CallTarget target = 3;
  // Status is the latest durable lifecycle state.
  CallStatus status = 4;
  // InputsClosed states whether additional streamed inputs are forbidden.
  bool inputs_closed = 5;
  // InputCount is the number of durably committed inputs.
  uint64 input_count = 6;
  // ResultCount is the number of durably committed results or yields.
  uint64 result_count = 7;
  // Graph records durable call parent relationships.
  CallGraph graph = 8;
  // CreatedAtUnixMillis is the persistence time before execution.
  uint64 created_at_unix_millis = 9;
  // UpdatedAtUnixMillis is the most recent durable transition time.
  uint64 updated_at_unix_millis = 10;
  // Error is present when the call has a terminal structured error.
  oneof error_presence {
    // Error is the terminal structured error.
    CallError error = 11;
  }
  // Stats contains accumulated durable execution statistics.
  CallStats stats = 12;
  // Labels are user-defined lookup metadata.
  map<string, string> labels = 13;
  // ResultCursor is the durable result sequence frontier for reconnecting consumers.
  ResultCursor result_cursor = 14;
}

// StreamCallInputsRequest is one frame in a client-streamed input append.
message StreamCallInputsRequest {
  // Frame contains an opening call reference or one indexed input.
  oneof frame {
    // Call must be the first stream frame.
    CallRef call = 1;
    // Input is appended atomically at its index.
    CallInput input = 2;
  }
}

// StreamCallInputsResponse reports the committed input frontier.
message StreamCallInputsResponse {
  // Call identifies the updated durable call.
  CallRef call = 1;
  // CommittedInputCount is the number of contiguous committed inputs.
  uint64 committed_input_count = 2;
  // LastInput is absent on the opener acknowledgement and present after an input commit.
  oneof last_input_presence {
    // LastInput identifies the input acknowledged by this response.
    InputRef last_input = 3;
  }
  // MaxInputsOutstanding is the server-advertised bound for sent but unacknowledged inputs.
  uint32 max_inputs_outstanding = 4;
}

// CloseCallInputsRequest closes a durable generator or batch input stream.
message CloseCallInputsRequest {
  // Call identifies the open call.
  CallRef call = 1;
  // ExpectedInputCount protects against closing before all inputs are committed.
  uint64 expected_input_count = 2;
}

// ListCallsRequest filters and paginates durable calls.
message ListCallsRequest {
  // Function is present to restrict calls to a logical function.
  oneof function_presence {
    // Function limits results to one logical function.
    FunctionRef function = 1;
  }
  // Status is present to restrict calls to one lifecycle state.
  oneof status_presence {
    // Status limits results to one lifecycle state.
    CallStatus status = 2;
  }
  // Actor is present to restrict calls to one durable actor.
  oneof actor_presence {
    // Actor limits results to one durable actor.
    ActorRef actor = 3;
  }
  // CreatedAfterUnixMillis is present to set an inclusive time lower bound.
  oneof created_after_presence {
    // CreatedAfterUnixMillis is the inclusive creation-time lower bound.
    uint64 created_after_unix_millis = 4;
  }
  // PageSize is the maximum result count; zero selects the server default.
  uint32 page_size = 5;
  // PageToken continues a prior stable listing.
  string page_token = 6;
}

// ListCallsResponse contains durable call records.
message ListCallsResponse {
  // Calls are ordered by creation time and call identifier.
  repeated CallRecord calls = 1;
  // NextPageToken is empty when no more calls remain.
  string next_page_token = 2;
}

// GetCallResultRequest selects one indexed durable result.
message GetCallResultRequest {
  // Call identifies the durable call.
  CallRef call = 1;
  // Index is the batch input index, generator yield index, or zero for unary.
  uint64 index = 2;
}

// CallResult is one committed indexed result or yield.
message CallResult {
  // Call identifies the owning durable call.
  CallRef call = 1;
  // Index is the batch input index, generator yield index, or zero for unary.
  uint64 index = 2;
  // Outcome contains exactly one value or structured error.
  oneof outcome {
    // Value is the committed result envelope.
    ValueEnvelope value = 3;
    // Error is the committed per-index error.
    CallError error = 4;
  }
  // CreatedAtUnixMillis is the result commit time.
  uint64 created_at_unix_millis = 5;
  // Sequence is strictly increasing across all committed results and yields in the call.
  uint64 sequence = 6;
  // InputId identifies the stable owning input.
  string input_id = 7;
  // InputIndex is the owning input's index, including for generator yields.
  uint64 input_index = 8;
  // YieldIndex is present only for an indexed generator output.
  oneof yield_index_presence {
    // YieldIndex is the generator-local output index.
    uint64 yield_index = 9;
  }
}

// ResultCursor identifies a durable position in one call result sequence.
message ResultCursor {
  // Call identifies the durable call.
  CallRef call = 1;
  // AfterSequence excludes results at or before this sequence.
  uint64 after_sequence = 2;
}

// EventCursor identifies a durable position in one call event log.
message EventCursor {
  // Call identifies the durable call.
  CallRef call = 1;
  // AfterSequence excludes events at or before this sequence.
  uint64 after_sequence = 2;
}

// ListCallResultsRequest requests a bounded durable result page.
message ListCallResultsRequest {
  // Cursor identifies the call and last consumed result sequence.
  ResultCursor cursor = 1;
  // PageSize is bounded by the server; zero selects the server default.
  uint32 page_size = 2;
}

// ListCallResultsResponse contains one bounded durable result page.
message ListCallResultsResponse {
  // Results are ordered by strictly increasing result sequence.
  repeated CallResult results = 1;
  // NextCursor resumes after the final returned result.
  ResultCursor next_cursor = 2;
  // End is true when no committed result follows NextCursor at response time.
  bool end = 3;
}

// WatchCallRequest resumes an ordered call event stream.
message WatchCallRequest {
  // Cursor identifies the call and last processed sequence.
  EventCursor cursor = 1;
  // Follow waits for new events after replaying committed history.
  bool follow = 2;
}

// StatusEvent records a durable lifecycle transition.
message StatusEvent {
  // Status is the new durable call state.
  CallStatus status = 1;
}

// LogEvent records worker log output.
message LogEvent {
  // Stream identifies stdout, stderr, or structured logging.
  LogStream stream = 1;
  // Data contains raw UTF-8 or application-defined structured bytes.
  bytes data = 2;
}

// AttemptFailureKind classifies why an execution attempt ended.
enum AttemptFailureKind {
  // ATTEMPT_FAILURE_KIND_UNSPECIFIED means no failure or an unknown failure class.
  ATTEMPT_FAILURE_KIND_UNSPECIFIED = 0;
  // ATTEMPT_FAILURE_KIND_USER is a policy-visible user-code failure.
  ATTEMPT_FAILURE_KIND_USER = 1;
  // ATTEMPT_FAILURE_KIND_INFRASTRUCTURE is a transparent platform failure.
  ATTEMPT_FAILURE_KIND_INFRASTRUCTURE = 2;
  // ATTEMPT_FAILURE_KIND_CANCELLED is cooperative or forced cancellation.
  ATTEMPT_FAILURE_KIND_CANCELLED = 3;
}

// AttemptEvent records an execution attempt transition.
message AttemptEvent {
  // AttemptId is the stable identifier shared by all events and stats for this attempt.
  string attempt_id = 1;
  // UserAttempt counts policy-visible retries caused by user execution failures.
  uint32 user_attempt = 2;
  // InfraAttempt counts transparent retries caused by infrastructure failures.
  uint32 infra_attempt = 3;
  // Status is the attempt transition.
  AttemptStatus status = 4;
  // Startup identifies cold, warm, or snapshot preparation.
  StartupKind startup = 5;
  // WorkerId is the diagnostic worker identity.
  string worker_id = 6;
  // Error is present when the attempt failed.
  oneof error_presence {
    // Error is the attempt's structured failure.
    CallError error = 7;
  }
  // FailureKind distinguishes user failures from transparent infrastructure failures.
  AttemptFailureKind failure_kind = 8;
}

// CallEvent is one immutable event in a call's sequence-numbered log.
message CallEvent {
  // Call identifies the durable call.
  CallRef call = 1;
  // Sequence is strictly increasing within the call and starts at one.
  uint64 sequence = 2;
  // CreatedAtUnixMillis is the durable event commit time.
  uint64 created_at_unix_millis = 3;
  // Type is a redundant discriminator useful for indexed storage.
  CallEventType type = 4;
  // Payload contains the typed event body.
  oneof payload {
    // Status records a lifecycle transition.
    StatusEvent status = 5;
    // Log records worker output.
    LogEvent log = 6;
    // YieldResult records an indexed generator yield.
    CallResult yield_result = 7;
    // Result records an indexed final result.
    CallResult result = 8;
    // AttemptEvent records an attempt transition.
    AttemptEvent attempt_event = 9;
    // Error records a structured execution error.
    CallError error = 10;
    // InputClosed records the final committed input count.
    StreamCallInputsResponse input_closed = 11;
    // CancelRequested records the durable cancellation request.
    CancelCallRequest cancel_requested = 12;
  }
  // InputId is present when the event is attributable to one stable input.
  oneof input_id_presence {
    // InputId identifies the stable input.
    string input_id = 13;
  }
  // InputIndex is present when the event is attributable to one indexed input.
  oneof input_index_presence {
    // InputIndex is the owning input's index.
    uint64 input_index = 14;
  }
  // AttemptId is present when the event is attributable to one execution attempt.
  oneof attempt_id_presence {
    // AttemptId is the stable execution attempt identifier.
    string attempt_id = 15;
  }
}

// ErrorFrame is one structured stack frame.
message ErrorFrame {
  // File is the source file or module.
  string file = 1;
  // Line is the one-based source line, or zero when unavailable.
  uint32 line = 2;
  // Function is the source function name.
  string function = 3;
  // Code is the optional source excerpt.
  oneof code_presence {
    // Code is a diagnostic source excerpt.
    string code = 4;
  }
}

// CallError is a language-neutral structured execution error.
message CallError {
  // Code is a stable machine-readable platform or application code.
  string code = 1;
  // Message is the human-readable failure description.
  string message = 2;
  // Type is the producer's exception or error type.
  string type = 3;
  // Retryable indicates whether policy may schedule another attempt.
  bool retryable = 4;
  // Frames contains an outermost-to-innermost stack trace.
  repeated ErrorFrame frames = 5;
  // Cause is present for a structured causal error chain.
  oneof cause_presence {
    // Cause is the immediately wrapped error.
    CallError cause = 6;
  }
  // Details contains non-secret machine-readable attributes.
  map<string, string> details = 7;
}

// AttemptStats contains timing and resource usage for one attempt.
message AttemptStats {
  // AttemptId is the stable identifier shared with attempt events.
  string attempt_id = 1;
  // UserAttempt counts policy-visible user-code retries.
  uint32 user_attempt = 2;
  // InfraAttempt counts transparent infrastructure retries.
  uint32 infra_attempt = 3;
  // Startup identifies cold, warm, or snapshot preparation.
  StartupKind startup = 4;
  // FailureKind classifies the failure that ended this attempt, if any.
  AttemptFailureKind failure_kind = 5;
  // QueuedMillis is time spent awaiting worker assignment.
  uint64 queued_millis = 6;
  // StartupMillis is time spent preparing the worker.
  uint64 startup_millis = 7;
  // ExecutionMillis is time spent running user code.
  uint64 execution_millis = 8;
  // CpuMillis is metered CPU time.
  uint64 cpu_millis = 9;
  // PeakMemoryBytes is peak resident memory.
  uint64 peak_memory_bytes = 10;
}

// CallStats contains durable aggregate timing and resource usage.
message CallStats {
  // QueueMillis is total time awaiting worker assignment.
  uint64 queue_millis = 1;
  // StartupMillis is total worker preparation time.
  uint64 startup_millis = 2;
  // ExecutionMillis is total user execution time.
  uint64 execution_millis = 3;
  // WallMillis is elapsed time from creation through the latest transition.
  uint64 wall_millis = 4;
  // CpuMillis is total metered CPU time.
  uint64 cpu_millis = 5;
  // PeakMemoryBytes is the maximum observed resident memory.
  uint64 peak_memory_bytes = 6;
  // Attempts contains per-attempt timing and startup classification.
  repeated AttemptStats attempts = 7;
}

// CancelCallRequest durably requests call cancellation.
message CancelCallRequest {
  // Call identifies the durable call.
  CallRef call = 1;
  // Reason is a user-visible cancellation reason.
  string reason = 2;
  // RequestId provides idempotency for retried cancellation.
  string request_id = 3;
}

// ActorCheckpointRef identifies an immutable actor checkpoint.
message ActorCheckpointRef {
  // CheckpointId is the stable server-assigned identifier.
  string checkpoint_id = 1;
}

// ActorRecord is the durable state of an actor identity.
message ActorRecord {
  // Ref identifies the actor.
  ActorRef ref = 1;
  // Function pins the actor implementation revision.
  RevisionRef function = 2;
  // Status is the latest durable actor state.
  ActorStatus status = 3;
  // CreatedAtUnixMillis is the actor commit time.
  uint64 created_at_unix_millis = 4;
  // UpdatedAtUnixMillis is the most recent durable transition time.
  uint64 updated_at_unix_millis = 5;
  // LatestCheckpoint is present after at least one checkpoint or restore.
  oneof latest_checkpoint_presence {
    // LatestCheckpoint identifies the actor's current recovery point.
    ActorCheckpointRef latest_checkpoint = 6;
  }
  // Labels are user-defined lookup metadata.
  map<string, string> labels = 7;
}

// ActorCheckpoint is an immutable actor recovery point.
message ActorCheckpoint {
  // Ref identifies the checkpoint.
  ActorCheckpointRef ref = 1;
  // Actor identifies the source actor.
  ActorRef actor = 2;
  // Function pins the compatible actor implementation revision.
  RevisionRef function = 3;
  // State is the content-addressed serialized actor state.
  ValueEnvelope state = 4;
  // Sequence is the actor's last committed operation sequence.
  uint64 sequence = 5;
  // CreatedAtUnixMillis is the checkpoint commit time.
  uint64 created_at_unix_millis = 6;
}

// CreateActorRequest durably creates a new actor identity.
message CreateActorRequest {
  // Function pins an actor-lifecycle function revision.
  RevisionRef function = 1;
  // InitialPayload is absent for a no-argument constructor.
  oneof initial_payload {
    // InitialValue is one serialized constructor value.
    ValueEnvelope initial_value = 2;
    // InitialArguments contains positional and named constructor arguments.
    InvocationArguments initial_arguments = 5;
  }
  // RequestId provides idempotency for retried creation.
  string request_id = 3;
  // Labels are user-defined lookup metadata.
  map<string, string> labels = 4;
}

// CheckpointActorRequest requests an immutable actor checkpoint.
message CheckpointActorRequest {
  // Actor identifies the actor to checkpoint.
  ActorRef actor = 1;
  // RequestId provides idempotency for retried checkpointing.
  string request_id = 2;
}

// RestoreActorRequest atomically restores an actor from a checkpoint.
message RestoreActorRequest {
  // Actor identifies the existing actor identity.
  ActorRef actor = 1;
  // Checkpoint identifies the compatible immutable recovery point.
  ActorCheckpointRef checkpoint = 2;
  // RequestId provides idempotency for retried restoration.
  string request_id = 3;
}

// ForkActorRequest creates a new actor from an immutable checkpoint.
message ForkActorRequest {
  // Checkpoint identifies the source recovery point.
  ActorCheckpointRef checkpoint = 1;
  // RequestId provides idempotency for retried forks.
  string request_id = 2;
  // Labels are user-defined lookup metadata for the new actor.
  map<string, string> labels = 3;
}