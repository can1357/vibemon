name: integration

on:
  # Real-VM integration needs a self-hosted KVM (Linux/x64) runner and a
  # bare-metal Apple Silicon (HVF) runner — GitHub-hosted runners can't boot
  # guests (hosted macOS is itself a VM → HV_DENIED). Trigger on demand and
  # nightly only, so push/PR don't leave integration checks perpetually
  # "Queued — Waiting to run" against a runner that never comes online.
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read

jobs:
  integration:
    name: KVM integration
    runs-on: [self-hosted, kvm, x64]
    env:
      VMON_TAP: vmon0
      VMON_HOST_IP: 192.168.249.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Build vmm
        run: cargo build --locked

      - name: Build static guest agent
        run: just agent-musl

      - name: Fetch test assets
        run: just fetch-assets

      - name: Prepare host tap
        run: |
          sudo ip link delete vmon0 2>/dev/null || true
          sudo ip tuntap add dev vmon0 mode tap
          sudo ip addr add 192.168.249.1/24 dev vmon0
          sudo ip link set dev vmon0 up

      - name: Run Python real-VM e2e
        working-directory: python
        run: |
          uv run e2e.py
          uv run cli_e2e.py
          VMON_KVM_E2E=1 uv run pytest tests/test_e2e.py -q

      - name: Run integration tests
        run: just integration

      - name: Run soak tests
        if: github.event_name == 'schedule'
        run: just soak

  hvf-integration:
    name: HVF integration
    # Needs a bare-metal Apple Silicon self-hosted runner: GitHub-hosted macOS
    # runners are themselves VMs and cannot create an HVF guest (HV_DENIED).
    runs-on: [self-hosted, macos, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Install native dependencies
        run: brew install libslirp pkg-config e2fsprogs cpio

      - name: Install Zig linker
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@cargo-zigbuild

      - name: Build vmm
        run: cargo build --locked

      - name: Build static guest agent
        run: just agent-musl

      - name: Fetch test assets
        run: just fetch-assets

      - name: Run Python real-VM e2e
        working-directory: python
        run: |
          uv run e2e.py
          uv run cli_e2e.py
          VMON_KVM_E2E=1 uv run pytest tests/test_e2e.py -q

      - name: Run HVF integration tests
        run: just integration

      - name: Run soak tests
        if: github.event_name == 'schedule'
        run: just soak
