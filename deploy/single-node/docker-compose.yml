services:
  vmon:
    build:
      context: ../..
      dockerfile: deploy/single-node/Dockerfile
    container_name: vmon-daemon
    restart: always
    depends_on:
      - buildkit
    network_mode: host # Allows direct bind to interfaces and TAP configuration
    privileged: true # Required for nested virtualization, KVM access, and advanced network namespaces
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - DAC_OVERRIDE
    devices:
      - "/dev/kvm:/dev/kvm"
      - "/dev/net/tun:/dev/net/tun"
    volumes:
      - vmon-data:/var/lib/vmon
    environment:
      VMON_API_TOKEN: ${VMON_API_TOKEN:?set VMON_API_TOKEN to a random secret}
      VMON_BUILDKIT_ADDR: tcp://127.0.0.1:1234

  buildkit:
    image: moby/buildkit:v0.20.2-rootless
    container_name: vmon-buildkit
    restart: always
    network_mode: host
    user: "1000:1000"
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    command:
      - --addr
      - tcp://127.0.0.1:1234
      - --oci-worker-no-process-sandbox
    volumes:
      - buildkit-data:/home/user/.local/share/buildkit

volumes:
  vmon-data:
    driver: local
  buildkit-data:
    driver: local
