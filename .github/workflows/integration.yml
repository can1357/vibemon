name: integration

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read

jobs:
  integration:
    name: KVM integration
    # GitHub-hosted Linux runners expose /dev/kvm (nested virtualization), so the
    # full KVM e2e suite runs here without a self-hosted box.
    runs-on: ubuntu-latest
    env:
      VMON_TAP: vmon0
      VMON_HOST_IP: 192.168.249.1
      # Pin the guest kernel to the fetched test asset; otherwise default_kernel()
      # falls back to the runner's own /boot/vmlinuz-*, which is root-only (0600).
      VMON_KERNEL: ${{ github.workspace }}/target/test-assets/bzImage-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        # Grant the runner user access to /dev/kvm and fail loudly if the runner
        # lacks it, so the e2e suite can never silently skip into a false green.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true
          # The udev rule covers nodes created later; chmod the already-present
          # device so a non-root vmm can open it this run.
          sudo chmod 0666 /dev/kvm || true
          test -r /dev/kvm && test -w /dev/kvm || { echo "::error::/dev/kvm not accessible"; exit 1; }
          ls -l /dev/kvm

      - name: Install system dependencies
        # cpio builds the busybox initramfs; e2fsprogs (mkfs.ext4) builds the
        # rootfs fixtures. docker is preinstalled and builds image rootfses.
        run: |
          sudo apt-get update
          sudo apt-get install -y cpio e2fsprogs

      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Build vmm
        run: cargo build --locked

      - name: Build static guest agent
        run: just agent-musl

      - name: Fetch test assets
        run: just fetch-assets

      - name: Prepare host tap
        run: |
          sudo ip link delete vmon0 2>/dev/null || true
          sudo ip tuntap add dev vmon0 mode tap
          sudo ip addr add 192.168.249.1/24 dev vmon0
          sudo ip link set dev vmon0 up

      - name: Run Python real-VM e2e
        working-directory: python
        run: |
          uv run e2e.py
          uv run cli_e2e.py
          VMON_KVM_E2E=1 uv run pytest tests/test_e2e.py -q

      - name: Run integration tests
        run: just integration

      - name: Run soak tests
        if: github.event_name == 'schedule'
        run: just soak

  hvf-integration:
    name: HVF integration
    # Needs a bare-metal Apple Silicon self-hosted runner: GitHub-hosted macOS
    # runners are themselves VMs and cannot create an HVF guest (HV_DENIED). Skip
    # on push/PR so it never blocks; run via manual dispatch or the nightly
    # schedule once such a runner is online.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: [self-hosted, macos, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Install native dependencies
        run: brew install libslirp pkg-config e2fsprogs cpio

      - name: Install Zig linker
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@cargo-zigbuild

      - name: Build vmm
        run: cargo build --locked

      - name: Build static guest agent
        run: just agent-musl

      - name: Fetch test assets
        run: just fetch-assets

      - name: Run Python real-VM e2e
        working-directory: python
        run: |
          uv run e2e.py
          uv run cli_e2e.py
          VMON_KVM_E2E=1 uv run pytest tests/test_e2e.py -q

      - name: Run HVF integration tests
        run: just integration

      - name: Run soak tests
        if: github.event_name == 'schedule'
        run: just soak
