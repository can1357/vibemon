apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "vmon.fullname" . }}-node
  labels:
    {{- include "vmon.labels" . | nindent 4 }}
    app.kubernetes.io/component: node
spec:
  serviceName: {{ include "vmon.fullname" . }}-nodes
  replicas: {{ .Values.nodes.replicaCount }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "vmon.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: node
  template:
    metadata:
      labels:
        {{- include "vmon.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: node
    spec:
      automountServiceAccountToken: false
      dnsPolicy: ClusterFirstWithHostNet
      hostNetwork: {{ .Values.nodes.hostNetwork }}
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "vmon.selectorLabels" . | nindent 18 }}
                  app.kubernetes.io/component: node
              topologyKey: kubernetes.io/hostname
      {{- with .Values.nodes.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodes.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: postgresql-ready
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; do sleep 2; done
          env:
            - name: PGHOST
              value: "{{ if .Values.postgresql.enabled }}{{ include "vmon.fullname" . }}-postgresql{{ else }}{{ .Values.externalDatabase.host }}{{ end }}"
            - name: PGPORT
              value: "{{ if .Values.postgresql.enabled }}5432{{ else }}{{ .Values.externalDatabase.port }}{{ end }}"
            - name: PGUSER
              value: "{{ if .Values.postgresql.enabled }}{{ .Values.postgresql.auth.username }}{{ else }}{{ .Values.externalDatabase.username }}{{ end }}"
            - name: PGDATABASE
              value: "{{ if .Values.postgresql.enabled }}{{ .Values.postgresql.auth.database }}{{ else }}{{ .Values.externalDatabase.database }}{{ end }}"
        - name: s3-ready
          image: "{{ .Values.s3Storage.clientImage.repository }}:{{ .Values.s3Storage.clientImage.tag }}"
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set vmon "$VMON_S3_ENDPOINT" "$VMON_S3_ACCESS_KEY" "$VMON_S3_SECRET_KEY"; do sleep 2; done
              {{- if .Values.s3Storage.enabled }}
              mc mb --ignore-existing "vmon/$VMON_S3_BUCKET"
              {{- else }}
              until mc stat "vmon/$VMON_S3_BUCKET" >/dev/null; do sleep 2; done
              {{- end }}
          env:
            - name: VMON_S3_ENDPOINT
              value: "{{ if .Values.s3Storage.enabled }}http://{{ include "vmon.fullname" . }}-s3:9000{{ else }}{{ .Values.externalS3.endpoint }}{{ end }}"
            - name: VMON_S3_BUCKET
              value: "{{ if .Values.s3Storage.enabled }}{{ .Values.s3Storage.auth.bucket }}{{ else }}{{ .Values.externalS3.bucket }}{{ end }}"
            - name: VMON_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "vmon.s3Secret" . }}
                  key: access-key
            - name: VMON_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "vmon.s3Secret" . }}
                  key: secret-key
      containers:
        - name: vmon
          image: "{{ .Values.nodes.image.repository }}:{{ .Values.nodes.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.nodes.image.pullPolicy }}
          command: ["/bin/sh", "/etc/vmon/start-node.sh"]
          securityContext:
            {{- toYaml .Values.nodes.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.nodes.livenessProbe | nindent 12 }}
          readinessProbe:
            exec:
              command: ["/usr/bin/test", "-f", "/tmp/vmon-mesh-ready"]
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.nodes.resources | nindent 12 }}
          env:
            - name: VMON_CLUSTER_MODE
              value: {{ .Values.global.clusterMode | quote }}
            - name: VMON_SANDBOX_UID
              value: "10000"
            - name: VMON_SANDBOX_GID
              value: "10000"
            - name: VMON_REGION
              value: {{ .Values.nodes.region | quote }}
            - name: VMON_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "vmon.apiSecret" . }}
                  key: api-token
            {{- if or .Values.nodes.clientToken .Values.existingSecret }}
            - name: VMON_CLIENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "vmon.apiSecret" . }}
                  key: client-token
                  optional: true
            {{- end }}
            - name: VMON_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vmon.postgresSecret" . }}
                  key: postgres-password
            - name: VMON_DB_USERNAME
              value: "{{ if .Values.postgresql.enabled }}{{ .Values.postgresql.auth.username }}{{ else }}{{ .Values.externalDatabase.username }}{{ end }}"
            - name: VMON_DB_HOST
              value: "{{ if .Values.postgresql.enabled }}{{ include "vmon.fullname" . }}-postgresql{{ else }}{{ .Values.externalDatabase.host }}{{ end }}"
            - name: VMON_DB_PORT
              value: "{{ if .Values.postgresql.enabled }}5432{{ else }}{{ .Values.externalDatabase.port }}{{ end }}"
            - name: VMON_DB_NAME
              value: "{{ if .Values.postgresql.enabled }}{{ .Values.postgresql.auth.database }}{{ else }}{{ .Values.externalDatabase.database }}{{ end }}"
            - name: VMON_DB_SSLMODE
              value: "{{ if .Values.postgresql.enabled }}disable{{ else }}{{ .Values.externalDatabase.sslmode }}{{ end }}"
            - name: VMON_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "vmon.s3Secret" . }}
                  key: access-key
            - name: VMON_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "vmon.s3Secret" . }}
                  key: secret-key
            - name: VMON_S3_REGION
              value: "{{ if .Values.s3Storage.enabled }}{{ .Values.s3Storage.auth.region }}{{ else }}{{ .Values.externalS3.region }}{{ end }}"
            - name: VMON_S3_ENDPOINT
              value: "{{ if .Values.s3Storage.enabled }}http://{{ include "vmon.fullname" . }}-s3:9000{{ else }}{{ .Values.externalS3.endpoint }}{{ end }}"
            - name: VMON_S3_BUCKET
              value: "{{ if .Values.s3Storage.enabled }}{{ .Values.s3Storage.auth.bucket }}{{ else }}{{ .Values.externalS3.bucket }}{{ end }}"
            - name: VMON_S3_PREFIX
              value: "{{ if .Values.s3Storage.enabled }}{{ .Values.s3Storage.auth.prefix }}{{ else }}{{ .Values.externalS3.prefix }}{{ end }}"
            - name: VMON_BUILDKIT_ADDR
              value: "{{ if .Values.buildkit.enabled }}tcp://{{ include "vmon.fullname" . }}-buildkit:1234{{ else }}{{ .Values.buildkit.address }}{{ end }}"
          volumeMounts:
            - name: config
              mountPath: /etc/vmon
              readOnly: true
            - name: kvm
              mountPath: /dev/kvm
            - name: tun
              mountPath: /dev/net/tun
            - name: data
              mountPath: /var/lib/vmon
      volumes:
        - name: config
          configMap:
            name: {{ include "vmon.fullname" . }}-config
            defaultMode: 365
        - name: kvm
          hostPath:
            path: /dev/kvm
            type: CharDevice
        - name: tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
        - name: data
          hostPath:
            path: /var/lib/vmon
            type: DirectoryOrCreate
