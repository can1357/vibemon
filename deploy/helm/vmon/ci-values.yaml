global:
  clusterMode: production
nodes:
  replicaCount: 3
  apiToken: supersecret-admin-token-16-chars-long
  clientToken: restricted-client-token-16-chars-long
  portableHistoryKeyId: cluster-recovery
  portableHistoryKey: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
  image:
    repository: vibevmm/vmon
    tag: latest
buildkit:
  enabled: true
  address: ""
  image:
    repository: moby/buildkit
    tag: v0.20.2-rootless
  persistence:
    enabled: true
    size: 20Gi
postgresql:
  enabled: true
  auth:
    database: vmon_metadata
    username: vmon_admin
    password: change-me-postgres-password
s3Storage:
  enabled: true
  auth:
    accessKey: change-me-s3-access-key
    secretKey: change-me-s3-secret-key
    bucket: vmon-artifacts
    region: us-east-1
