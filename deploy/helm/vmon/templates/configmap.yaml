apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vmon.fullname" . }}-config
  labels:
    {{- include "vmon.labels" . | nindent 4 }}
data:
  serve.toml: |
    [serve]
    host = "0.0.0.0"
    port = 8000
    home = "/var/lib/vmon"
    idle_timeout = 300.0
    warm_pool_size = 1
    replicas = {{ .Values.nodes.replicaCount }}
    replicate_sec = 60.0
    restore_quorum = true
  start-node.sh: |
    #!/bin/sh
    set -eu
    db_username=$(jq -nr --arg value "$VMON_DB_USERNAME" '$value | @uri')
    db_password=$(jq -nr --arg value "$VMON_DB_PASSWORD" '$value | @uri')
    db_name=$(jq -nr --arg value "$VMON_DB_NAME" '$value | @uri')
    export VMON_POSTGRES_URL="postgresql://${db_username}:${db_password}@${VMON_DB_HOST}:${VMON_DB_PORT}/${db_name}?sslmode=${VMON_DB_SSLMODE}"


    /usr/local/bin/vmon serve --config /etc/vmon/serve.toml &
    server_pid=$!
    terminate() {
      kill -TERM "$server_pid" 2>/dev/null || true
      wait "$server_pid" || true
    }
    trap terminate TERM INT

    until curl -fsS http://127.0.0.1:8000/healthz >/dev/null; do
      if ! kill -0 "$server_pid" 2>/dev/null; then
        wait "$server_pid"
      fi
      sleep 1
    done

    seed="http://{{ include "vmon.fullname" . }}-node-0.{{ include "vmon.fullname" . }}-nodes:8000"
    advertise="http://${HOSTNAME}.{{ include "vmon.fullname" . }}-nodes:8000"
    setup_target="$seed"
    if [ "$advertise" = "$seed" ]; then
      setup_target="http://127.0.0.1:8000"
    fi
    seed_body=$(jq -cn --arg advertise "$seed" --arg region "$VMON_REGION" \
      '{advertise: $advertise, region: $region}')
    seed_setup=$(curl -fsS --retry 60 --retry-connrefused --retry-delay 1 \
      -H "Authorization: Bearer $VMON_API_TOKEN" -H 'Content-Type: application/json' \
      -d "$seed_body" "$setup_target/v1/mesh/setup")

    if [ "$advertise" != "$seed" ]; then
      blob=$(printf '%s' "$seed_setup" | jq -er '.blob')
      join_body=$(jq -cn --arg blob "$blob" --arg advertise "$advertise" \
        --arg region "$VMON_REGION" '{blob: $blob, advertise: $advertise, region: $region}')
      curl -fsS --retry 60 --retry-connrefused --retry-delay 1 \
        -H "Authorization: Bearer $VMON_API_TOKEN" -H 'Content-Type: application/json' \
        -d "$join_body" http://127.0.0.1:8000/v1/mesh/join >/dev/null
    fi
    touch /tmp/vmon-mesh-ready

    wait "$server_pid"
