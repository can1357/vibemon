version: v2
inputs:
  - directory: proto
plugins:
  - remote: buf.build/protocolbuffers/go
    out: sdk/go/internal
    opt: module=github.com/can1357/vibemon/sdk/go/internal
  - remote: buf.build/grpc/go
    out: sdk/go/internal
    opt: module=github.com/can1357/vibemon/sdk/go/internal
  - remote: buf.build/protocolbuffers/python
    out: sdk/py
  - remote: buf.build/grpc/python
    out: sdk/py
  - remote: buf.build/protocolbuffers/pyi
    out: sdk/py
  - remote: buf.build/bufbuild/es
    out: sdk/ts/src/gen
    opt: target=ts
  - remote: buf.build/bufbuild/es
    out: ui/src/gen
    opt: target=ts
