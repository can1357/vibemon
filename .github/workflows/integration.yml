name: integration

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read

jobs:
  kvm-integration:
    name: KVM integration
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      VMON_TAP: vmon0
      VMON_HOST_IP: 192.168.249.1
      # Pin the guest kernel to the fetched test asset; otherwise default_kernel()
      # falls back to the runner's own /boot/vmlinuz-*, which is root-only (0600).
      VMON_KERNEL: ${{ github.workspace }}/target/test-assets/bzImage-x86_64
      VMON_BUILDKIT_ADDR: tcp://127.0.0.1:1234
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare KVM host
        uses: ./.github/actions/kvm-host

      - name: Start rootless BuildKit worker
        run: |
          docker run --detach --name vmon-buildkit --privileged \
            --publish 127.0.0.1:1234:1234 \
            moby/buildkit:v0.20.2-rootless \
            --addr tcp://0.0.0.0:1234 \
            --oci-worker-no-process-sandbox
          docker cp vmon-buildkit:/usr/bin/buildctl /tmp/buildctl
          sudo install -m 0755 /tmp/buildctl /usr/local/bin/buildctl
          for attempt in {1..30}; do
            if buildctl --addr "$VMON_BUILDKIT_ADDR" debug workers >/dev/null 2>&1; then
              break
            fi
            if [[ "$attempt" -eq 30 ]]; then
              docker logs vmon-buildkit
              exit 1
            fi
            sleep 1
          done

      - name: Run Rust gated integration suite
        run: VMON_E2E=1 cargo test --tests -- --test-threads=1

      - name: Run Python SDK real-VM e2e
        run: VMON_BIN=$PWD/target/debug/vmon VMON_E2E=1 uv run python sdk/py/e2e.py

      - name: Run Rust cluster e2e
        run: VMON_CLUSTER_E2E=1 VMON_E2E=1 cargo test --test cluster_e2e -- --test-threads=1

      - name: Stop rootless BuildKit worker
        if: always()
        run: docker rm --force vmon-buildkit || true

  hvf-integration:
    name: HVF integration
    # Needs a bare-metal Apple Silicon self-hosted runner: GitHub-hosted macOS
    # runners are themselves VMs and cannot create an HVF guest (HV_DENIED). Skip
    # on push/PR so it never blocks; run via manual dispatch or the nightly
    # schedule once such a runner is online.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: [self-hosted, macos, arm64]
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Install native dependencies
        run: brew install libslirp pkg-config e2fsprogs cpio

      - name: Install Zig linker
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@cargo-zigbuild

      - name: Build vmon
        run: cargo build --locked

      - name: Codesign vmon for HVF
        run: just codesign

      - name: Build static guest agent
        run: just agent-musl

      - name: Fetch test assets
        run: just fetch-assets

      - name: Run Rust gated integration suite
        env:
          CARGO_TARGET_AARCH64_APPLE_DARWIN_RUNNER: ${{ github.workspace }}/demo/hvf-test-runner.sh
          VMON_ENTITLEMENTS: ${{ github.workspace }}/hvf.entitlements
          VMON_E2E: "1"
        run: cargo test --tests -- --test-threads=1

      - name: Run Python SDK real-VM e2e
        run: VMON_BIN=$PWD/target/debug/vmon VMON_E2E=1 uv run python sdk/py/e2e.py

      - name: Run Rust cluster e2e
        env:
          CARGO_TARGET_AARCH64_APPLE_DARWIN_RUNNER: ${{ github.workspace }}/demo/hvf-test-runner.sh
          VMON_ENTITLEMENTS: ${{ github.workspace }}/hvf.entitlements
          VMON_CLUSTER_E2E: "1"
          VMON_E2E: "1"
        run: cargo test --test cluster_e2e -- --test-threads=1
