{{- if .Values.buildkit.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vmon.fullname" . }}-buildkit
  labels:
    {{- include "vmon.labels" . | nindent 4 }}
    app.kubernetes.io/component: buildkit
spec:
  ports:
    - name: buildkit
      port: 1234
      targetPort: buildkit
      protocol: TCP
  selector:
    {{- include "vmon.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: buildkit
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "vmon.fullname" . }}-buildkit
  labels:
    {{- include "vmon.labels" . | nindent 4 }}
    app.kubernetes.io/component: buildkit
spec:
  serviceName: {{ include "vmon.fullname" . }}-buildkit
  replicas: 1
  selector:
    matchLabels:
      {{- include "vmon.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: buildkit
  template:
    metadata:
      labels:
        {{- include "vmon.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: buildkit
      annotations:
        container.apparmor.security.beta.kubernetes.io/buildkit: unconfined
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: Unconfined
      containers:
        - name: buildkit
          image: "{{ .Values.buildkit.image.repository }}:{{ .Values.buildkit.image.tag }}"
          imagePullPolicy: {{ .Values.buildkit.image.pullPolicy }}
          args:
            - --addr
            - tcp://0.0.0.0:1234
            - --oci-worker-no-process-sandbox
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: buildkit
              containerPort: 1234
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: buildkit
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.buildkit.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /home/user/.local/share/buildkit
      {{- if not .Values.buildkit.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
  {{- if .Values.buildkit.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.buildkit.persistence.storageClass }}
        storageClassName: {{ .Values.buildkit.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.buildkit.persistence.size | quote }}
  {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vmon.fullname" . }}-buildkit
  labels:
    {{- include "vmon.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "vmon.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: buildkit
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "vmon.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: node
      ports:
        - port: 1234
          protocol: TCP
{{- end }}
